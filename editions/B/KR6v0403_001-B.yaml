body:
  text: 天然和尚年譜引言吾粵佛教自六祖後宋世盛於雲門元明寖衰崇禎壬午間天然昰和尚應陳子壯諸人之請開法訶林宗風大振顧天然雖處方外仍以忠孝廉節垂示及門迨明社既屋文人學士搢紳遺老多皈依受具一時禮足凡數千人創立海雲海幢別傳諸剎嗚呼何其盛也余少日過庭輒聞明季諸老軼事間及宗門掌故心竊慕焉稍長讀天然諸弟子詩文知多有託而逃欲有所為者其皈心空王非初志也故金陵福州肇慶之擁立廣州之歸附屢仆屢起凡十餘年天然以世外之身未能參預其間而平昔所投分者大都節義之士聲氣隱隱相通今讀瞎堂集於殉難諸臣多有詩哀輓其故可深長思已至其心懷故國遺臣志士咸集其門獨能超然無所連染者是其法力偉大感人甚深異於出世者流徒耽寂滅也辛巳初春新會陳援庵先生自北平寄眎明季滇黔佛教考陳寅恪先生序之謂政治與宗教雖不同物而終不能無所關涉又豈獨滇黔為然哉爰輯次天然和尚年譜附著述考弟子考距其開法訶林時適足甲子五周矣竊歎年來道法衰微人天隔阻安得有如天然者起而復振之哉天然同時若鼎湖在犙贊和尚亦與當代遺逸往來結納為世景仰而傳衣法侶不若天然之盛宗派流衍並難詳考此篇限於天然一派非以概當時佛之教而天然實為大眾所依歸法門之砥柱知人論世因以見世衰法盛之由其亦談宗門掌故者所樂聞歟余觕覽遺編詎通禪契書闕有間蒐訪未備訂譌補漏俟之博雅君子一九四二年壬午夏六月番禺汪宗衍天然和尚年譜和尚名函昰字麗中別字天然嗣長慶空隱道獨法博山無異元來長孫為曹洞宗第三十四傳本姓曾名起莘字宅師番禺縣慕德里司迼逕村人世為邑中望族天然昰禪師語錄附今辯撰行狀湯來賀撰塔誌銘按同治番禺縣志本傳注云邑慕德里司迼逕村曾氏族譜有師俗支派雍正廣東通志選舉表作花縣人檀萃楚庭稗珠錄四云一作花縣迼逕人考康熙二十四年以南海番禺兩縣地析置花縣宣統番禺縣續志輿地圖吉逕入花縣界內與慕德里司毗連輿地志同蓋迼逕吉逕同地本屬番禺後入花縣故有二說道光廣東通志本傳作南雄人其選舉表及道光南海縣志本傳作南海人均誤道獨字宗寶號空隱南海陸氏年二十九入博山參無異得其法迭主華首長慶海幢法席著長慶語錄元來字無異龍沙舒氏主博山寺著無異語錄集要父名昌位字本淨約生明萬曆九年辛巳母名函福字智母番禺官塘村林羅長女生萬曆十二年甲申以萬曆三十二年甲辰來歸本淨公後俱出世行狀今無光宣臺集十大日菴智母師太塔誌銘按本淨公生年據瞎堂詩集十雷峯三月詩有七十老翁初入寺句為順治七年作推知之本淨公生子一人即和尚女三長適羅蚤卒次名今心字頓徹季名今再字來機皆和尚之妹出世為廣州城東無著庵比丘尼光宣臺集十智母師太塔誌銘瞎堂詩集八悼袁特丘中丞四首有而媳師吾妹句原注云謂頓徹比丘尼據無著庵祖堂神牌有頓徹心其字派當為今字今再事跡見譜內同治番禺縣志古蹟略作今最誤妻某氏名函脫字善解禮道獨為比丘尼詳本譜崇禎十五年壬午條按無著庵祖堂神牌有善解脫蔡守寒瓊室筆記稿本云相傳為來機之嫂是和尚之俗妻既禮道獨其字派當為函字明神宗萬曆三十六年戊申公元一六八一歲十月十四日亥時生胎胞紫衣墮地始出行狀塔誌銘本淨公約二十八歲智母師太二十五歲見譜前元來三十四歲永覺廣錄十八元賢撰衣鉢塔銘道獨九歲道獨長慶語錄附函昰撰行狀萬曆三十九年辛亥一六一一四歲剩人函可生語錄十二剩人和尚塔銘函可字祖心號剩人博羅韓氏名宗騋文恪公曰纘長子諸生道獨第二法嗣以文字獄遣戌瀋陽開法千山大闡宗風著千山語錄千山詩集萬曆四十一年癸丑一六一三六歲出就外傅一日覺身若隕虛來無所從大哭返家熟睡乃已如是者兩度行狀旋菴今湛生海雲禪藻集二今湛字旋庵三水李氏髫齡出世住番禺員岡鄉隆興寺聞天然禪師倡道訶林與其徒達此藉本寺田畝室廬供諸十方延天然作開山第一祖發願行募鼎新殿閣易名海雲遂成寶坊萬歷四十二年甲寅一六一四七歲澹歸今釋生徐乾學憺園集三二丹霞澹歸禪師塔誌銘今釋字澹歸族姓金名堡字道隱仁和人崇禎庚辰進士授臨清知州永曆時官至兵科給事中有直聲以事遣戌至桂林城陷遂薙髮為僧壬寅參雷峯受具執役盌頭後創建丹霞別傳寺為天然第四法嗣生平著述甚富有徧行堂集等萬曆四十六年戊午一六一八十一歲十月今再生按詩集十八壽來機禪人五十一詩有蓮花歲歲臘前開句後為贈王冲和道者詩有華林初請法輪旋句和尚以康熙七年戊申入華林壽來機詩似為同年之作以五十一年逆推疑生於戊午光宣臺集二五有壽來機師太六十初度二首云坐消冰雪見淒清萬頃鴻濛未可名妙得空王些子意梅花歲歲滿空庭空懸慧日照須彌六十還將六十期三界總來無變相何人識得末山機亦無年分然可知其生於冬月也曾見今釋壽來機詩軸真蹟詩曰調御人天即丈夫非男女相漫名模欲栽美玉先觀地更鑄精金別鼓爐六天應共聽難兄一宿豈殊塗南山莫獻無疆壽禁得油喝也無欵署丁巳陽月寄為來機大師六秩初度同門今釋拜手以丁巳上推六十年是生于戊午十月矣番禺縣續志三六載王令撰鼎建無著庵碑記末署康熙十八年今再立石時年六十三猶健在也萬曆四十七年己未一一六九十二歲石鑑今覞生今釋徧行堂續集八石鑑禪師塔誌銘謂康熙十七年戊午卒無生年歲數然有庚子受具語海雲禪藻集一云年四十二落髮受具遂得其生年今覞字石鑑新會楊氏字無見諸生以居士悟入落髮受具為天然第二法嗣繼席棲賢旋移長慶復返棲賢工詩著直林堂集廣慈今攝生海雲禪藻集一今攝字廣慈番禺崔氏禮天然受具居侍寮最久後充雷峰監院諸職入廬山淨成受大法為天然第十法嗣康熙二十五年卒年六十八著巢雲遺稿光宗泰昌元年庚申一六二十三歲擬注周易問太極相生於塾師為依文解說和尚曰此名言耳太極究為何物且兩儀未生極何從往兩儀既判極何從去塾師不能答性好施與有僧欺之再四遂不喜見僧行狀塔誌銘熹宗天啟元年辛酉一六二一十四歲鐵機今沼生海雲禪藻集二今沼字鐵機番禺曾氏名暐字自昭天然族姪少為諸生庚寅亂後入雷峰結茅閉關三年輔旋庵湛募化殿宇落成庚子受具命司記室尋升按雲堂師沼於書無所不讀工行楷擅古詩駢文有集行世天啟三年癸亥一六二三十六歲憨山德清卒年七十八錢謙益初學集六八憨山五乳峰塔銘德清字憨山全椒蔡氏年十九祝髮縛茅天界寺居東海之牢山十三年方便說法以詔獄遣戌編伍於雷州居五年移曹溪既返廬山五乳峯復度嶺病卒天啟四年甲子一六二四十七歲補諸生與里人梁未央朝鍾黎美周遂球羅季作賓王陳全人學佺張莂公二果李烟客雲龍諸人在賓王之散木堂縱談當世務以康濟為己任行狀塔誌銘海雲禪藻集三陳伯陶勝朝粵東遺民錄按散木堂在廣州城東芳草街黎遂球蓮鬚閣集七偕峨嵋僧過羅大夫季作讀其新詩云芳草街頭繞曲池行吟堪與大夫期遂球故居屈大均翁山文鈔一黎太僕公畫象記謂在芳草東街番禺縣志云在豪賢街要皆相近也梁朝鍾字未央番禺人崇禎十五年舉人明年成進士紹武立授翰林院檢討兼兵科給事中尋授國子監司業廣州陷殉難少禮道獨為居士山名函徹字妙明著喻園集黎遂球字美周番禺人禮道獨山名函美字於斯天啟舉人會試不第歸至揚州集鄭超宗影園賦黃牡丹詩錢謙益拔置第一時稱黃牡丹狀元隆武時授兵科職方司給事中賜勅印提督兩廣水陸義師援贛州城陷殉難著蓮鬚閣集羅賓王字敬甫號季作番禺人萬曆乙卯舉人旋成進士官南昌同知告歸禮道獨為居士名函駱字思唐國變後抗節不屈諸王義師紛起草抗義勤王揭下獄作為詩歌意氣益厲得釋後未幾卒著獄中草散木堂集陳學佺字全人東莞人崇禎六年舉人性至孝所交友皆以性命相勗為文本於躬行事道獨受戒於椒園公車歸未幾卒張二果字穉復東莞人天啟七年舉人崇禎九年詔舉賢才總督熊文燦科臣郭九鼎兩疏交薦不就入廬山禮道獨為僧名弘悟字莂公創建羅浮華首水簾洞山諸寺棲息其中崇禎十三年卒于廬山著是誰集白業卮言李雲龍字烟客番禺諸生少負奇氣走塞上客袁崇煥幕歸里後參禮道獨削髮為僧稱二嚴和尚為羅浮藏主著雁水堂集嘯樓集等左副都御史楊漣劾魏忠賢二十四大罪不納與左光斗同削籍歸明史楊漣左光斗傳天啟五年乙丑一六二五十八歲和尚知慕宗乘智母師太因之素食智母雅性嚴峭和尚侍庭幃時微有不合意則默言竟日必長跪色解乃已光宣臺集十智母師太塔誌銘和尚偶與同學薦亡友入寺見一老宿語及持咒能致功名和尚漫應之出語陳學佺曰吾輩功名豈假咒力耶學佺曰隨人志願耳求功名得功名求慧性得慧性和尚然之晨夕持誦苦念慮不靜於心性中始生疑慮久不自安一夕靜坐忽覺向所擾者當下冰釋讀圓覺經與己見合就十二菩薩法門各作一頌示諸同學無不推服及閱傳燈錄不解其旨並失却從前所得疑情大發懇親學出世法親曰汝欲出世待名成償所學未晚和尚遂精研世典克成通儒行狀自言予少從魯誥囿於見聞曾不知世外復有大聖人能過孔孟間從浮屠家多聞因果事輒指為虛誕以是數年可否不肯作決定信一日過友人案頭得首楞嚴讀三四卷雖不甚解為何等語然理趣深玄業面熱心折遂攜歸終十卷所見十習因六交報一一皆從心生不由外鑠乃不敢以虛誕及淺近事誣謗因果自此由教乘入宗趣歷八九稔始識向上一路語錄十二刻牟子辯惑序按詩集三有憶昔詩云憶昔年十八矢志學浮圖是年間與李雲龍父子結社於天關離際道丘有贈雁水堂李煙客曾宅師諸公結社參究四首詩云般舟三昧舍安逸吾佛翹勤七日立猛然截斷小胡牀一個蒲團何待七其二云白馬青牛隨去住西竺先生何所遇唯然一貫自銷融萬象之中身獨露其三云女大須婚男大娶團欒誰解無生句眼底眉毛始放開脚頭早跨三台步其四云手握木蛇曹氏女道人本色無刀斧嘉州大象喫黃連陝府鐵牛滿口苦鼎湖山志六海雲禪藻集二按番禺縣志天關書院在廣州東城內湛若水建後為子孫居宅今天官里即以天關書院而得名關官北音相近梁朝鍾喻園集有與陳全人夜坐憶在天關西園小樓詩殆朝鍾學佺皆同社也道丘字離際號棲壑順德柯氏年十七薙染雲棲蓮池大師授以淨土法門並付衣鉢尋還粵詣法性寄庵大師受圓具戒命為教授開法鼎湖慶雲寺粵人之成僧者非鼎湖即海雲焉順治十五年卒年七十三李雲子字山農番禺人雪龍長字素持梵行嘗從天然結社天關遭亂以父長往遂棄章縫隱於柏堂故里教授生徒丙子薙染受具名今从字淨起李龍子字田叔雲子弟崇禎己卯舉人以父長往遂退隱山林家無半畝之入因館穀就食辛丑薙染受具名今荎字具五超悟出羣天然極期許之楊漣左光斗魏大中周朝瑞袁化中顧大章六君子被逮下獄旋死明史楊漣傳威宗崇禎元年戊辰一六二八二十一歲陝西大饑張獻忠等起義明史莊烈帝紀和尚嘗作莫厭貧詩云弱冠不知道抱志志四方讀書慕先賢設心追上皇蒿目切時艱夙夜矢濟匡寒雲起西北中原臨蒼茫千羽投西江感物情慘傷天運不可回猖狂歸山陽詩集五澤萌今遇生成鷲咸陟堂文集六澤萌遇禪師傳今遇字澤萌江蘇華亭孫氏年十九依雲棲會下尊宿落䰂禮洞下三宜和尚受具後入匡廬參天然返雷峰乃受付囑為天然第八法嗣迭主丹霞棲賢雷峰法席康熙四十年卒年七十四崇禎二年己巳一六二九二十二歲訶衍今摩生海雲禪藻集一喻園集卷首今摩字訶衍番禺曾氏名琮天然之俗子少從梁朝鍾讀書穎悟拔俗遭亂一夕窺內典遂盡蠲夙習受具雷峰付以大法為天然第三法嗣嘗結廬匡山鶴鳴峰三十餘年後聞山中僧徒悉編保伍遂歸雷峰康熙三十七年卒年七十崇禎三年庚午一六三二十三歲元來卒年五十六元賢永覺廣錄崇禎六年癸酉一六三三二十六歲秋舉鄉試第二榜發方歌鹿鳴坐念功名富貴與己無預行狀塔誌銘粵東詩海九八道獨偕張二果至杭州寓昭慶寺蓮鬚閣集十六西湖雜記阿字今無生光宣臺集附古雲撰行狀今無字阿字番禺萬氏年十七禮天然為僧癸巳隨杖入匡山監院棲賢備諸苦行旋奉命訪剩人禪師於瀋陽復遊瓊州歸雷峰天然付以大法為第一法嗣主海幢創建大剎一時法席之盛不減晦堂大慧著光宣臺集崇禎七年甲戌一六三四二十七歲會試不第後有憶與陳全人下第南歸舟次金陵宿報恩塔院憶過姑蘇憶過西湖與余中丞集生汎舟諸詩當為本年事詩集十三行狀余大成字集生應天人萬曆丙午舉人明年成進士累遷至太僕寺卿出為山左巡撫以事遣戍嶺南劉香起義粵督叩戶問策名公巨卿競執弟子禮賜環即入浙之橫山建光明臺與二三知己翛然終老南還至吉州臥病金牛寺醫不下藥和尚起坐禱十方佛曰倘得不死即一心學道自為為人於諸聲利無所圖也是夜感異夢汗透重襟而病頓愈還家後斷欲長齋參究彌切衣不解帶者兩月大悟玄旨向所謂傳燈不解者如數黑白嗣是闔門益耽信佛時與張二果談性宗相得甚歡行狀光宣臺集十智母師太塔誌銘按金牛寺塔銘作金牛渡受持妙法蓮華經語錄十二書自書法華經後自言甲戌知有此事以來循覽天下彼時胸中惟黃巖天童兩老而已語錄十二華首語錄序黃巖謂道獨天童指密雲圓悟也圓悟字覺幻宜興蔣氏八歲無師訓知念佛三十從龍池幻有傳和尚脫白萬曆三十九年付與衣鉢傳寂繼席龍池於通玄金粟黃蘖育王天童六座道場三十餘年宗風大振崇禎十五年卒年七十七崇禎八年乙亥一六三五二十八歲智母師太之母郭氏卒郭依於女亦以和尚事佛遂發信心修西方法門暮年感佛光照空者再光宣臺集十智母師太塔誌銘八月與梁朝鍾同祭亡友黎臣哉顓孫兄弟朝鍾撰祭文喻園集陳學佺卒喻園集祭麥仲涵文云陳全人之喪曾宅師警而超然又祭霍始生文云全人歿後宅師以大事因緣一旦蠲除父母妻子入道並謂辛巳季春始生表弟歾始生死後全人六年是學佺死於乙亥矣始生名師乾南海人與和尚同癸酉鄉榜崇禎九年丙子一六三六二十九歲詔舉賢良方正總督熊文燦以和尚特薦當授郡守和尚掉頭不顧行狀塔誌銘按詔舉賢良事明史本紀不載行狀敘在己卯而塔誌銘則云己卯復上公車下文謂先是有詔行保舉則知其事在己卯前矣朱彛尊明詩綜七六引靜志居詩話云崇禎丙子有詔舉賢良方正宣統東莞縣志六三張二果傳原注引金通志云崇禎九年詔舉賢才督臣熊文燦科臣郭九鼎兩疏交薦故繫於此年熊文燦字心開貴州永寧人萬曆進士崇禎初累官至右僉都御史總督兩廣旋拜兵部尚書總理九省軍務一意主撫張獻忠初降擁萬人據穀城復起義文燦坐是棄市明史有傳總督熊文燦延請問道待以師禮時值發南漢冢株連甚眾有厚饋求轉懇免罪和尚婉辭不納行狀按發南漢王冢年分據乾隆番禺縣志五雍正廣東通志云在崇禎十五年其時和尚已北上文燦亦逮死可據以訂正之冬北上與張二果同謁道獨於匡山之黃巖往返叩擊針芥相投便絕意行脚獨示以偈曰風旛一頌解投機千里同風事亦奇三上黃巖問端的實知野老不相欺行狀塔誌銘長慶語錄按徐霞客遊記云廬山黃巖寺據雙劍峰下越澗再上得黃石巖巖石飛突平覆如砥巖側茅閣方丈幽雅出塵閣外修竹數竿拂羣峰而上與山花霜葉映配峰際鄱陽一點正當窗牖掩關歸宗閱藏本至牟子三十七篇益以童年不早得此為恨約出關必圖鐫之語錄十二牟子辯惑序自言丙子禮金輪塔便有三十年不出山之約詩集十八初住歸宗詩自注崇禎十年丁丑一六三七三十歲寓鷲峰寺後有憶崇禎丁丑寓鷲峰寺上元日早朝詩詩集十三熊文燦北上總理九省軍務梁朝鍾偕行和尚與張二果自廬山至漳江迎之朝鍾有同熊總理心開舟師過漳江時張莂公曾宅師扁舟來自廬山詩詩云西山依去棹江水白銀蟾廬阜幾年思毫光計日瞻晴波喧畫鷁皓月帶黃巖相見無餘話名香竟夕甜泊樵舍與宅師莂公談金輪舊事詩詩云未將鷫鷞向伊呈剛道鋒銛劈面迎一滴未消巴蜀雪寸機方動晉陽枰太行方疊疑山出黃木千尋障海泓為向金輪阿育塔莫疑因果煞分明遂同謁道獨於黃巖獨謂文燦曰公誤矣文燦屏人問故獨曰公自度所將兵足制賊死命乎文燦曰不能獨曰諸將有可屬大事當一面不煩指揮而定者乎文燦曰未知如何也獨曰二者既不能當賊上以名使公厚責望一不效誅矣文燦却立良久曰撫之何如獨曰吾料公必撫然流賊非海賊比公其慎之朝鍾有同熊心開楊海門張莂公曾宅師劉觀復入黃巖謁空和尚道開先寺寺石壁有吳道子鐫觀音像王伯安平宸濠紀功碑文詩詩云湖上金風滯鼓鼙征衣秋水淨禪棲雨花初地紛龍藏落葉空林駐馬蹄