相過一日坐石偶及云老師徧歷諸大老門殘羹餿飯拈放一邊畢竟還有商量處麼徧云衲子家捨此亦無可語者不嫌絡索試汙眼看遂出偈相示卻把二十八宿編成八句我當時讀過但笑徧云不可只笑亦須有箇可否我便云偈卻是只是汝未是徧云為什麼偈是我却非聻老僧云徧參知識耳朵聽得多少冊子裏見偈多少方寸裏安排亦無有不盡了作偈下語豈有不妥處只是道人須貴自知不可只管互相瞞昧徧乃定眼看老僧良久忽起合掌云真獅子兒難逃慧鑑真不謬為華首首座矣語錄三道獨亦云山僧初到此時聞麗首座云如今只是揉爛其心始得山僧銘入心髓首座怎麼不惜勤苦山僧也合併一副心力大家鼓舞長慶語錄時梁朝鍾佽助經營是臺蔚為大剎陳伯陶羅浮志補和尚有歸隱羅浮詩報老父詩詩集十崇禎十五年壬午一六四二三十五歲省親廣州陳集生子壯率諸人士延請開法訶林十月朔日入院越日道獨命函可持送拂子并傳法偈云祖祖相傳祗一心青原南嶽不須分三玄照用非他立五位君臣為此陳棒下無生凡聖絕臨機不見有師僧訶林重豎風旛論却幸吾宗代有人撰有語錄函修為作序和尚以文人慧業深入真際有叩則鳴道聲由是遠播顧和尚雖處方外仍以忠孝廉節垂示及門故未幾國變文人學士搢紳遺老多皈依受具每於生死去就多受其法益甚深締信抑且父母妻妹弟姪子媳以隸臧獲先後落䰂為僧尼實有以作觀感也語錄一塔誌銘長慶語錄海雲禪藻集一顧光光孝寺志智母師太與媳函脫禮道獨落髮為比丘尼受具光宣臺集十智母師太塔銘冬道獨刻華首語錄成和尚為作序語錄十二圓悟卒年七十七錢謙益有學集三六清兵分道入塞京師戒嚴畿南郡邑多不守明史莊烈帝紀崇禎十六年癸未一六四三三十六歲入福建作邵武道中憶華首老人延平舟中諸詩旋離邵武還羅浮取道普慶林德賓請遊獅子峰同闔寺大眾懇請說法有語錄并作嶺南汀州道中憶老父老母諸詩語錄二詩集十七刻訶林語錄成作刻訶林語錄成謝諸檀越詩詩集十七李自成破潼關明史莊烈帝紀崇禎十七年清世祖順治元年甲申一六四四三十七歲函可不是庵落成黎遂球有喜祖心師不是庵成同麗中師丁善甫梁漸子李山農子雲諸淨侶過集詩詩云淨侶東鄰近往還迎人老鶴護禪關臨池小閣看如舫渡水長橋坐對山似倚法王裘馬氣猶嫌長者布金慳誰能及第心空比寶座玲瓏芳樹間蓮鬚閣集七按詩無年分次於甲申聞雁前一首乾隆番禺縣志云黃華寺在東門外崇禎十七年甲申僧函可建千山詩集有憶黃花堂七絕粵小記云黃花寺在番禺黃花村俗名黃花塘蓋不是庵為本名黃華寺者人以其地名名之遂球故宅在廣州芳草東街見翁山文鈔與黃華塘僅一城牆之隔故有淨侶東鄰近往還句李雲龍嘯樓集有題不是庵詩丁邦禎字善甫東莞人少以文學知名好談經世務與張二果交莫逆篤信浮屠之說戒律精嚴隆武元年舉人張家玉疏薦促其入閩值廣州陷未赴以憂憤卒函可有詩悼之梁佑逵字漸子順德人崇禎己卯舉人工古文詞尤精史學與黎遂球相師友偕陳子壯等十二人修復南園詩社廣州陷棄家為僧字喆喬未幾卒天然有詩悼之和尚自遭國變志切遠遁以二親在無可代養就城東結宇顏曰小持船以便往省行狀羅德若龍祥有小持船落成承麗中大師招集詩詩云青門花雨歇重見法航開小結東林社人從西竺來書登天祿閣道峻粵王臺暫憇香壇下依稀若渡杯海雲禪藻集四按小持船為靜室見海雲禪藻集二今鏡傳其址無考詩集十有還小持船示諸子次於乙酉送梁弼臣北上詩前其落成殆在甲申間羅龍祥字德若番禺明經禮天然為居士名今莖字草一三月李自成陷北京明威宗自縊於宮中四月自成西走五月清兵入北京多爾袞居攝明福王由崧監國於南京旋即帝位以明年為弘光元年九月清世祖入關明史莊烈帝紀諸王傳清史稿世祖紀南明史綱安宗弘光元年紹宗隆武元年順治二年乙酉一六四五三十八歲初春避地白雲山之歸龍作絕句三首有二十年前舊遊處句行狀詩集十七按歸龍諸志不載道獨年十六縛茅歸龍山十餘年乃入博山見其行狀嶺南叢述引粵中見聞云白雲山頂為摩星嶺嶺有寺亦曰白雲寺左一溪曰歸龍其上飛雲百仞盤舞噴薄明陳文忠抗疏歸儲為湖建雲淙別業疑即其地也正月函可入金陵請藏東華錄二語錄剩人和尚塔銘屈翁山大均來見和尚以其姿性奇異命從陳巖野邦彥學於粵秀山屈氏家譜云公少而姿性奇異孝廉曾起莘見而奇之命從陳邦彥學於粵秀山而無年分翁山詩外四秋夜恭懷先業師巖野陳先生云憶昔從師粵秀山小子年方一十五惟翁山佚文巖野陳公傳云予年十六從公受周易毛詩年歲互異陳恭尹獨漉堂詩集三贈別屈翁山云與君結交初十五侍親庭大均生崇禎三年庚午長於恭尹一歲從學時為十六歲故繫於此屈大均字翁山番禺諸生從陳邦彥起義師獨當一隊李成棟反正奔行在上中興六大典書廣州再陷從天然落髮受具名今種字一靈選為侍者嘗北走京師訪函可於千山未達往來吳越始南歸返儒服著述甚富工為詩與梁佩蘭陳恭尹稱嶺南三大家五月清兵陷南京閏六月唐王聿鍵即帝位於福建改元隆武明史諸王傳南明史綱南都陷時黃端伯殉義和尚悼以詩云品行文章第一人曾隨匡嶽憶前身分明學得無生處博得浮名總宿因徽州陷金聲殉義復悼以詩云頭目髓腦君甘捨山河日月淚難乾可憐石上三生話回首歸宗夢裏看詩集十七黎遂球監督粵兵赴贛城陷殉難明史黎遂球傳後和尚撰有忠愍公黎美周先生象贊蓮鬚閣集卷首語錄未載末題廬山紫霄天然昰和尚作當為康熙十三年後所撰隆武二年順治三年丙戌一六四六三十九歲大學士熊開元以書偈與和尚相問訊有復熊魚山書二通語錄十並答以詩有檀越近遺新脫粟今年不似去年貧句八月汀州陷開元為僧齊雲山中和尚有中秋玩月寄熊魚山內閣齊雲山中詩云偏與圓明繞一半那邊消息許誰親大家舉起雲門餅須憶齊雲山裏人又寄以詩云富貴功名夢裏人誰知苦樂正相鄰回頭大有甘心處須信身貧道不貧未幾和尚亦有入齊雲詩云深山高臥白雲屯閒聽林鶯盡日喧不為癡呆寧有此肝腸空向石頭論又有別熊魚山呈偈云擘破微塵出箇人虛空逼塞莫為鄰分明內外渾無物萬兩黃金難買貧是時和尚蓋在閩也詩集十七語錄九明史諸王傳有自作象贊云汝形短小汝量急狹汝眼深闊汝情疏達汝心不可測有時雷轟電急有時青天白日問汝汝不知人亦不能無物惟有齊雲頑石頭終日與渠相對默呵呵呵破衲蒙頭一道翁推移與世無拘執繪亦得不繪亦得天下萬世誰人識語錄九當在齊雲作十月兩廣總督丁魁楚等迎桂王由榔監國於肇慶十一月蘇觀生擁立唐王聿於廣州改元紹武桂王遂即帝位明年改元永曆十二月清將佟養甲李成棟陷廣州紹武被害和尚有樵山聞亂詩則已返粵矣詩集十七明史諸王傳南明史綱清兵入粵明諸王孫多見疑放戮尸橫於野和尚遍拾骸骨別建塚以瘞之不封不樹後有議聞行在者和尚止之曰吾盡吾心矣復何圖哉行狀清史稿世祖紀云順治四年二月乙未朱聿僭號紹武據廣州佟養甲李成棟率師討之斬聿及周王肅𥄳益王思𤆃遼王術雅鄧王器䵺鉅野王壽通山王蘊越高密王宏椅仁化王慈魶鄢陵王肅汭安南王企壟等廣州平按清史稿據奏聞之曰故書於四年列傳四博洛傳云殺明唐王聿及諸王孫世子十餘人即紹武君臣塚也梁朝鍾霍覺商子衡父子俱殉難和尚哭以詩云白刃春風冷懸厓撒手時及父子情俱重君臣義獨深句詩集七霍子衡字覺商南海人萬曆舉人歷袁州同知紹武立詔為太僕卿廣州陷子衡偕妾及三子應蘭應荃應芷與妻子小婢俱投井死明史有傳道丘年六十一和尚有詩壽之詩集十七鼎湖山志昭宗永曆元年順治四年丁亥一六四七四十歲避亂西樵山中作西樵寫懷十首有覔得茅庵奉老親及睦叟無鞋應愧母隱峰有妹足閒身句詩集十旋返廣州小持船袁特丘彭年來見詩集八按今再受具之年未詳今釋撰無著庵碑記稱其笄年入道壯年接法於其兄似今再受具約在本年間有妹句指今心今再也袁彭年字介眉號特丘湖廣公安人崇禎甲戌進士初授淮安推官永曆時官至廣東布政使左都御史與金堡劉湘客丁時魁蒙正發稱五虎禮天然為居士名今忭字高齊旋里後被害天然有詩悼之秋梁弼臣殿華龐祖如嘉耋迎和尚結期於南海之弼唐鄉語錄梁殿華序梁殿華字弼臣番禺人崇禎壬午舉人明年成進士南都立殿華北上天然有詩贈之旋禮為居士名今轉與函可最契合可戍瀋陽殿華欲往訪問以病阻白門不能赴未幾卒龐嘉耋字祖如南海人貢生世居弼唐鄉少從陳邦彥梁朝鍾學朝鍾歿嘉耋寫刻其遺集行世遭亂禮天然為居士名今燄字若雲築易庵敘禪者其中與之沉空守寂弼唐林木清幽風俗敦樸丙戌亂後陳恭尹陶璜方顓愷梁佩蘭皆往依之九月羅賓王被逮下獄有寄本師空老和尚兼呈天大師詩詩云年來長下獄不負獄中燈此地人誰到懷師道益增敢無慙羑里猶恐愧孫登眄眄慈光上巢雲定幾層海雲禪藻集四無年分乾隆番禺縣志十五羅賓王傳云順治丙午獲釋惟順治無丙午丙午為康熙五年必有誤字粵東詩海五七載賓王九月初九日父子同下獄詩亦無年分天然有出訶林聞羅季作訃詩勝朝粵東遺氏錄稱其被逮在丁亥以張家玉韓如琰起兵賓王為草倡義勤王揭事詩海有獄中同畿兒守歲詩其出獄當在戊子粵東反正時矣縣志稱丙午獲釋者以順治之五年誤為康熙五年之丙午也是秋陳邦彥陳子壯張玄子家玉以起義死皇明四朝成仁錄和尚哀之作廣州三首有秩宗守義車先裂文苑連營陳亦亡萬古江山皆易主一朝簪紱自從王句同死者皆三公師友故云詩集十一張家玉字玄子號芷園東莞人崇禎進士隆武時進翰林院侍講兼給事中授僉都御史奉使入廣及閩陷乃家居丙戌廣州陷家玉毀家招兵據東莞與陳子壯陳邦彥相應轉戰增城兵敗赴水死明史有傳冬函可自金陵歸粵篋中有安宗致阮大鋮書稿及乙丙間親見諸死事臣紀為再變記一書城邏發焉遂被執順治東華錄二千山詩集顧夢游序晚晴簃詩匯邢昉讀祖心再變記漫述五十韻永曆二年順治五年戊子一六四八四十一歲正月梁殿華為作語錄序語錄卷首春廣州大饑斗米八百錢乾隆番禺縣志十八受雷峰隆興寺主今湛請掩關於寺中並為登具詩集十海雲禪藻集二按雷峯在番禺員罔鄉未幾返訶林作春歸詩有江山三月裏人事十旬違句詩集七夏阻饑於海雲作禪醉十篇有序云禪醉者何也蒙周曰醉者之墜車雖疾弗死骨節與人同而犯害與人異其天全也予醉於禪而寢是猶墜車者矣寢而無解乎醉殆所謂骨節與人同而犯害與人異歟使天下之人因其寱而識其醉則予之得全乎天者亦將以全乎人之天也反而齁齁然鼾而弗之醒至足矣又安知其所謂疾歟語錄十一按是時寺名隆興禪醉云阻饑於海雲乃後來追改九月再入光孝寺撰有語錄語錄一是年閏三月李成棟反正歸於明昭宗由梧州至肇慶四朝成仁錄十一函可遺戍瀋陽千山詩集附郝浴撰塔碑銘永曆三年順治六年己丑一六四九四十二歲住光孝寺有語錄重修殿宇古蹟多所興復作復風旛堂舊址詩並書榜焉詩集一行狀光孝寺志按乾隆南海縣志云順治六年禪師開法訶林重建風旛堂敕經樓方丈筆授軒蓋以時諱故缺天然二字春今無來投和尚座下為落髮受具光宣臺集七瓊州圓通觀記十二天老和尚七十示生頌按古雲撰今無行狀云年十六抵雷峯依天老人得度己丑無年十七亦非在雷峰也又謂年十七受壇經聞貓聲此辛卯事無年十九也又謂年十九入匡無年二十一非十九此狀多誤余別有考海雲禪藻集及勝朝粵東遺民錄皆沿其誤今光宣臺集古雲所編豈未校其文耶和尚自言山僧在訶林時有一僧呈偈數十首山僧接得但放案上便問無夢想無見聞主在甚麼處答云正在學人放身捨命處山僧道據你此答定謂會得落枕子時消息了也我更問你祗如第一問第二問還過得麼渠便謂猶是學人疑處山僧不覺失笑云今人勝似古人古人第一問第二問過得惟過不得第三問今人先過得第三問第一二問返過不得豈不是會得底與身心全無交涉究其流弊始於師家有箇極則處教人學會總不會向真實一回悟得是以今時師資說處儘有若到做處蚤已逗漏出許多生滅語錄六薛劍公始亨來廣州相見薛始亨蒯緱館十一草與天然和尚書薛始亨字剛生一字劍公順德人府學生少從陳邦彥學周易毛詩工詩古文詞尤熟曆算典章經濟丙戌亂後乃返龍江杜門不出嘗謁道獨為受記又從鼎湖弘贊受戒工畫竹石著南枝堂稿蒯緱館十一草王澹子瑯有喜天和尚自訶林解夏掩關雷峰詩詩云迢迢海濶烽煙遠虞苑深秋一棹還手拂寒雲歸野逕窗開明月認前山孤峯掃塔藏高影萬木橫橋斷俗閒池上風旛翻論後滿庭黃葉掩荊關海雲禪藻集四王瑯字澹子番禺人諸生與黎遂球朱學熙友善禮天然名今葉字開五葺野樗堂為終隱計著野樗堂稿鼃樓詩十二月十日光孝寺範銅世尊象上座時和尚在雷峰侯若孩性袁彭年與鄉紳王園長應華曾元魯道唯敦請復出訶林光孝寺志侯性字若孩河南歸德人補諸生習騎射授鎮守廣東西寧參將永曆初擢御營都督同知從扈入武岡封商丘伯掌中軍都督府事梧州陷性降之天然有送商丘伯侯若孩二首注云若孩以僧服奉母太夫人柩還中州海雲禪藻集四有王瑯海雲寺會送侯月鷺奉母太夫人櫬歸葬洛陽詩即性也曾道唯字元魯南海人萬曆進士官至山東按察使以病乞歸崇禎間起浙江右轄調湖廣左轄以親老乞休著介石齋稿王應華字崇闇號園長東莞人崇禎元年進士累官至禮部侍郎紹武時拜東閣大學士清兵入粵紹武匿應華家遂出降後入肇慶補光祿寺卿昭宗西奔乃皈依道獨名函諸字言者隱居以終天然有王園長入山詩及與王園長書十二月受新會邑侯萬興明請說法大雲山之龍興寺記汝今帾侍行一時搢紳文學並集為蓮社詩集六文玉居士七十一歌海雲禪藻集三廣東通志二二九萬興明江西南昌人舉人見廣東通志四五今帾字記汝新會人番禺諸生俗姓潘名楫清字水因夙與陳子升黎延祖兄弟及同里楊大進諸人遊國變後遂從天然受具辛丑為雷峰典客後隨天然住丹霞再住歸宗參究之下間疏音韻諧聲協律精研奧博著借峯詩稿天然有送記汝典客隨石鑑西堂之棲賢詩是年清世祖飭平南王尚可喜靖南王耿繼茂同定廣東各率其部以行元功垂範永曆四年順治七年庚寅一六五四十三歲正月在大雲山月林堂說法有語錄並作與諸衲遊知園遊圭峯古罔聞警諸詩詩集七語錄二三月本淨公自廣州至雷峰薙髮受具時智母師太亦促居近寺詩集七十屈大均禮和尚落髮為僧法名今種字一靈屈氏家譜翁山佚文二輯髻人說有學集補羅浮種上人詩集序函可住瀋陽有憶麗中法兄詩詩云濶別何年思杳茫一聲孤雁淚淋浪想當亂極悲親在共愛恩深見國亡書信竟無通遠塞烽煙曾否到禪房舊時相識多新鬼只恐身存已斷腸千山詩集十是年春清兵圍廣州十一月初二日城陷元功垂範死者七十萬人乾隆番禺縣志十八永曆五年順治八年辛卯一六五一四十四歲為今摩落髮受具其妻某後亦為比丘尼光宣臺集十智母師太塔銘海雲禪藻集一按今摩落髮之年禪藻謂庚寅冬一夕窺內典遂盡蠲宿習從大父母落䰂同時受具雷峰戊寅秋示寂世壽七十僧臘四十六此文有三誤本淨公為僧在庚寅三月詩集十雷峰三月詩有七十老翁初入寺句原注謂時老人新棄家為僧可證此一誤也智母為尼在壬午年見光宣臺集此二誤也假定今摩為僧在庚寅卒於戊寅則僧臘四十九云四十六是三誤也今據智母師太塔銘云孩男一人琮辛卯亦成比丘繫於本年惟明大統曆庚寅十一月閏清時憲曆辛卯二月閏今摩落髮之年禪藻塔銘相差一年或用新舊曆有不同歟作落齒吟云食笋忽落齒方知非壯年喜訶衍還山云乍別驚予瘦病四首云茶為傷脾少詩集七蓋年來遭逢世變體氣漸衰矣又有九日掃老父塔詩詩集七是本淨公當卒於本年間十月林叶玄夢錫有冬月祝本師天和尚四十又四詩詩云入望皎然白寒光萬古同魄臨朝鏡靜色映碧潭空鶴夢通三島梅花共一叢年年願相照長嘯此山中海雲禪藻集四林夢錫字叶玄番禺諸生禮天然為居士法名今舒字舍予是年間尚可喜折柬相邀以病辭不見勉出以賓主見禮意殷隆次日不辭而退行狀永曆六年順治九年壬辰一六五二四十五歲是年間無方今應刻天然和尚同住訓略一卷序云古設叢林耑為養道向上之士不宜限之準繩但晚近以來人多中下故重以莊嚴過望賢俊不妨損之又損以至於無要使入而就理不作事障出而就事不墜理詮然後以超越之心同於凡小上可踐吾門尊貴之路下可免流俗豁達之譏同住之始是用申明願各洗心毋墜先緒原書卷首按此書次行題雷峯監寺今應梓前半敘寺中職事之規則後半則訓戒之文塔誌銘謂和尚所立規矩整肅森嚴即指此也書無著作及刊刻年分今應晉監寺之年海雲禪藻集二亦不載之番禺縣續志三六銅佛款識云博山下二世雷峰隆興寺本師天然昰和尚率大檀越喜鑄監寺今應識喜者尚可喜也讀此可窺見和尚之風度考今釋撰雷峰海雲寺碑記云壬辰鑄鎏金釋伽如來一軀瑰麗殊絕殆即尚可喜捐鑄又詩集八悼無方二首有歸山將一歲哭子畏心傷及一上金仙殿常思作殿人句原注雷峯佛殿無方實董其成海雲禪藻集二今應傳云應字無方番禺人俗姓許己丑出世受具旋繼旋庵為雷峯監寺會修殿宇殿之宏麗鞏固應有力焉惜未工竣已西首矣和尚以戊戌春返粵雷峯大雄寶殿亦同年落成此書之刻當在壬辰丁酉間也今釋行脚入廣州禮和尚於雷峯為易名登具海雲禪藻集一成鷲咸陟堂文集六舵石翁傳為劉客生湘客受具字曰思圓詩集八薛始亨南枝堂集劉湘客序劉湘客字客生西安人遠生弟以諸生薦舉入官永曆中為詹事兼左副都御史與金堡袁彭年同稱五虎四年被劾遣戍桂林陷乃脫歸袁彭年亦禮和尚為居士名今忭字高齋詩集八海雲禪藻集四作侯若孩詩集序送商丘伯侯若孩二首語錄十二詩集十按序有侯子今返中州語詩次於壬辰除夕詩前當為同年作又有因亂奉母蕉林阿字頻為省視感而賦詩詩集七按詩集七有蕉林看嵓關主病詩海雲禪藻集二云今嵓居雷峰與頓修漸公結茅閉關三年則蕉林殆在雷峯附近函可有步韻和麗中大師寄懷詩詩云艱難百折兩人同話舊峰頭願不空佛似一家傳世業天教五國大門風此心肯共滄波去片紙長留朔雪中萬里遙遙情脈脈嶺雲邊月望何窮千山詩集十一永曆七年順治十年癸巳一六五三四十六歲薛始亨有與天然和尚書云大事因緣此生誓願成者非有退轉在今日實不能效和尚會下諸君吟詩寫字作名士之態談笑終日自詡大根器之所為也蒯緱館十一草按書無年分末有梁同生忽病痰而歿殞語詩集十一有九日悼梁同生次於癸巳詩中知始亨書亦同年作謝伯子長文入山相訪和尚有詩贈之詩集十謝長文字伯子一字雪航番禺歲貢生工詩古文詞與黎遂球相契陳子壯子升與遂球同開南園詩社伯子與焉補鄖陽縣知縣方行而楚陷廣州擁載授主事遷員外郎亂後不復出禮天然為居士名今悟字聞初著雪航稿秋水稿春大饑斗米千錢饑民羣聚茭塘村有七月二十二日口占詩云瘴海棲遲十二秋避兵長傍蓼花洲無端一夜西風急又報茄聲入市頭乾隆番禺縣志十八詩集十七遂侍智母師太入匡山今無頓修今漸偕行有病留凌江寺韶陽道中病起度大庾嶺道中被詰阻風宿險處諸詩抵山住歸宗寺并作禮金輪峯舍利塔詩詩集七十一光宣臺集十智母師太塔銘十二天老和尚七十示生頌海雲禪藻集二今漸字頓修浙江歸安人姓茅氏辛卯年二十入雷峰受具閉關二載畀掌記室從入棲賢監院事以母老歸再入廣州遇樂說辯和尚主法長慶遂留住會下永曆八年順治十一年甲午一六五四四十七歲住歸宗寺春函可至千頂可有遊香巖寺時諸老謀重建迎空老人麗大師詩詩云千峰頂上香巖寺積雪何年古道堙航海尚傳元學士登臺空揖石仙人寶幢雨洗燈方續禪榻雲封草漸新佇望雙飛天外錫寒邊早報十分春千山詩集十一四月八日再禮金輪峯舍利塔有詩紀之詩集十一秋移居棲賢光宣臺集十二天老和尚七十示生頌主法席康熙廬山志引江西舊志時荷鋤披荊誅茅光宣臺集六送頓修監寺棲賢詩愛其山水佳勝居頹垣敗瓦之下晏如也行狀為智母師太卜庵紫霄顏日慈氏光宣臺集十智母師太塔誌銘作棲賢山居十首有支籐上紫霄老母留芋供句詩集七刻有語錄語錄陸世楷序函可有和天然兄初住棲賢韻詩云鹿洞曾經過難尋三峽橋老兄今又至浩氣可全消石立潭邊靜泉飛谷口遙黃雲難極目夜夜夢魂搖千山詩集七七月自恣後三日有與阿字侍者書略云汝從來未曾做事即做事亦在山僧左右時有提誨此翻遠離不可不索性說破恐做事心勝不覺不知墮在無事甲裏即纔憬覺蚤成兩橛如此則全虧大人行履即做得事亦屬有為也仰觀古之大人不過行解相應而已必使解處即行處行處即解處方無滲漏若解過於行謂之見地中人日久歲深空成話餅所以善知識於學人常愛之極而終不敢兩手分付者正為此也山僧一向期汝過厚亦多見禪客七青八黃便自滿足甚且退失故欲汝一脚蹋到底若根本不深厚雖使枝葉茂盛祗益狂肆於己無益於人有損既無以折高明之心亦未易塞流俗之口汝今在十字街頭正好作一番試驗自知深淺也語錄十年月據手寫真蹟字句互有異同今藏台山黃氏小畫舫齊按自恣為休夏之末日即七月十六日是年閱藏詩集十四退院十四首冬元來八十壽奉道獨命入信州之博山掃塔獨自閩覺浪道盛自浙三宜明盂自吳往和尚經理博山讓道盛主席光宣臺集十二天老和尚七十示生頌道盛字覺浪福建柘浦張氏住金陵天界寺世稱天界浪杖人順治十六年卒年六十八明盂字三宜號愚庵錢塘丁氏杭州顯聖寺僧康熙四年卒年六十七永曆九年順治十二年乙未一六五五四十八歲住棲賢今摩來遊匡山海雲禪藻集一春侍道獨入高泉今無偕行四月之饒州至萬年山作萬年山居詩有夏日生涯易到秋陰森松竹倚山樓句今釋自棲賢至八月還泊南康城抵棲賢詩集十一光宣臺集六送頓修監寺棲賢序十二天老和尚七十示生頌徧行堂續集一四書義自序王說作邦畿有寄天和尚住棲賢一首詩云一自違師後於今兩載餘暮雲頻有夢春雁久無書傍寺參方丈逢人問起居得知佳勝處棲息愛吾廬耳鳴集二王邦畿字誠籥番禺副貢生隆武乙酉舉人廣州擁戴以薦官御史永曆初之肇慶及傾覆乃遁歸禮天然名今吼字說作少以詩鳴著耳鳴集為梵音今音登具海雲禪藻集二今音字梵音番禺曾氏原名起霖字湛師諸生天然之從弟平生任俠亂後入匡山求天然脫白嶺上遇道獨返粵為之落䰂乙未登具於棲賢隨天然返雷峰卒於華首臺著古鏡遺稿永曆十年順治十三年丙申一六五六四十九歲住棲賢遣今無之瀋陽訊函可送之以詩詩集十一可有棲賢先專普雨來及閩而返今冬阿字始至戲成二絕詩云纍纍低塚路茫茫普雨何曾及大荒怪殺羸軀兼善病竟將草屨試冰霜雁足先傳紙半張十年窖底伴羝羊棲賢門下多龍象蹴踏都應白玉堂千山詩集十六及和棲賢送阿字出塞詩詩云千里同風遠寄書天山翹首獨躊躇冰雪有緣兼累若父兄何事苦憐余白骨此中還得見黃沙之外更無餘何時生入盧龍塞金井梅花是舊廬千山詩集十三按普雨海雲禪藻集不載陳子升中洲草堂集有東過鬱洲與空和尚飛錫相近不克往訊歸後寄普雨澹歸二上座詩即其人也冬智母師太以苦寒返粵遣今再隨行並送以詩有同生惟有汝遠俗得余心句創大日庵於雷峰居之詩集八十一光宣臺集十智母師太塔誌銘按和尚有二妹名今心今再詳詩意似今心已歿矣函可有和棲賢和尚見寄韻一首詩云鈯斧東來話近因寸緘未達共沾巾艱難菽水愁孤鉢潦倒風沙泣罪人入夜笳聲傳雁塞何年斗氣合龍津鄉關逾遠師顏老櫓斷遙知路更頻千山詩集十二又有丙申除夕和棲賢辛卯除夕韻一首詩云只因生長在遼東誰是無鄉老此中今夜盡勾積歲念明朝須發向西風哭猶有淚情非至吟到無題詩亦窮細看此來真寂寞眼前還得幾人同千山詩集十三雷峯建置梵剎海雲禪藻集二今白傳道獨住廣州海幢寺撰華嚴寶鏡原書序永曆十一年順治十四年丁酉一六五七五十歲住棲賢春龔孝升鼎孳頒詔至粵持錢牧齊謙益書訪求道獨得鼎湖道丘藏德清夢遊全集獨為搜羅散佚曹秋嶽溶為集眾繕寫載以歸吳謙益校讐編定四十卷毛子晉晉鏤版刊行有學集二十一憨山大師夢遊全集序嶺南刻憨山大師夢遊全集序按龔鼎孳使粵為丙申冬末定山堂集二五同張登子鄧孝威遊海幢訪澹歸上人別澹歸三遊海幢諸詩皆次於丁酉故繫於此龔鼎孳字孝升號芝麓合肥人崇禎進士授兵部給事中李自成陷京師受直指使順治初迎降以原官起用屢官至禮部尚書工詩古文詞著定山堂集錢謙益字受之號牧齊常熟人萬曆中進士官至禮部侍郎坐事削職弘光時召為禮部尚書多鐸攻江南迎降授禮部右侍郎旋歸里著初學集有學集曹溶字潔躬又字秋嶽號倦圃秀水人崇禎丁丑進士官御史順治十三年由戶部侍郎出為廣東布政使左遷山西按察司副使整飭陽和道裁缺候用旋丁母憂不復出工詩著靜惕堂集毛晉字子晉世居虞山東湖藏書處曰汲古閣讐勘十三經十七史流布又刻津逮秘書皆宋元以前舊帙其他佚典秘文多不勝紀著海虞古今文苑明詩紀事九月今無自瀋南行光宣臺集十七丁酉九月南還別剩師叔詩按千山詩集四阿字行後作七首有崎嶇七千里出塞致書詞我來八九年是日一展眉寒臘亦易過興盡春已徂經夏復經秋忽憶匡廬期掩卷賦歸歟相聚雖一歲恍惚數夕同諸句當為丙申到瀋函可自順治五年遣戍至十三年所謂我來八九年也自丙申寒臘至翌年秋所謂相聚幾一歲也勝朝粵東遺民錄沿古雲撰今無行狀三年歸渡遼海語謂無在瀋三年誤矣函可有寄麗和尚書絕句詩云人天翹首嶺雲空又向匡廬覔舊叢杖底瀑飛三百丈好攜一滴灑遼東千山詩集十六按語錄十八剩人和尚塔銘云嘗有書抵余曰門下龍象如雲若得專一人來使某得盡其夾輔之力則曹源一滴長潤塞下噫余於此知師為法求人之切豈無所見顧再易裘葛耳忽一日曰我十日必去云再易裘暑則本年作書矣又有讀未央與莂公宅師談金輪舊事詩有感用原韻一首詩云人世難逢幾弟兄舊編重讀不勝情忠臣遺廟清珠海原注未央殉義後當事建祠於海濱祀之古佛雙林冷莞城原注莂公脫白後即示寂今十九年矣地下定知談往昔雪中難免恨孤惸只今惟有金輪月偏向棲賢破寺明千山詩集十三按梁未央詩見崇禎十年譜內永曆十二年順治十五年戊戌一六五八五十一歲春自棲賢還雷峯今摩今音海發今印隨行語錄十二刻牟子辨惑序詩集十一海雲禪藻集一二三謝長文有天然本師歸自匡山先札賦此寄訊一首詩云江山匡廬峯蒼翠矗空起巋然宇宙外五嶽皆平峙吾師久駐錫盡把江山美道與巒岫高長江失涯涘宗風久頹落賴師為振起寧續青原燈挺出曹溪指不向如來行自深微妙理師隨野鶴踪一到冬春徙我本沈冥人感師示遐軌團圞一室中悟言笑相視諭以惜餘年提以超生死惘惘恣遊行遂得皈依旨鐘鳴漏欲盡艱難相徙倚自幸有良緣威光莫予鄙近乃營口腹擔囊匿溪沚引領重徘徊雲間墮雙鯉長跪讀尺書恍惚在瞻跂行披庾嶺雲隨風迎道履雷峯月正秋共作大歡喜玻璃一盌燈揚波一滴水大地遍光明併照愚蒙子海雲禪藻集四今印字海發順德人族姓梁名之佩諸生丁酉至匡山禮天然落䰂受具旋隨天然還粵復返匡掌記室遣參諸方至楚見天章和尚一語契合付以大法命居西堂雷峯大雄寶殿落成隆興寺故湫隘眾不能容自是二十年營建未迄前殿伽藍閣左右廊廡先後建置巍然鼎新隆興改名海雲當在本年間海雲禪藻集二番禺縣續志三六今釋撰雷峯海雲寺碑記按番禺縣續志三六順治九年尚可喜捐鑄銅佛欵識仍題隆興而順治十六年鑄銅鐘欵識題曰海雲本年大雄寶殿落成和尚亦自匡山返粵其改名殆在本年歟時和尚立按雲堂策勵後學朝夕下堂勘驗刻有雷峯語錄語錄陸世楷序海雲禪藻集一今摩傳因小病掩室閱藏至牟子辨惑乃記二十餘年宿約命侍僧發梓並為之序曰吾輩初入學塾時依父兄師說深入功利纔稍長得自聞見每為宋儒理學所誤遇宓芻輩未必皆入理之士甚有傳述大顛韓愈事加以誇誕反為伶俐少年笑怪寶藏密函又深渺浩瀚學者懶習兼之先入之言橫梗胸臆輒一目棄去昔予從此中來同病相憐興懷忽忽惟牟子辨惑辭簡理辨可破羣疑是不能無望於天下英物矣語錄十二刻德清心經直說跋曰宗門流弊今日為甚究其始皆由浮慕之士不從生死發心以大道為名聞之資以名聞為利養之實持此心行未有不錯會古人向上之語謬謂無凡無聖既遣今古混同此一著絕大總持誰為承當誰為轉變决了慧用甚深難辨正謂以少方便疾證菩提從聲聞緣覺以迄菩薩佛地皆不能忘般若之功也昰歸自棲賢趨侍吾師捧讀心經直說可謂深救禪病因乞流通以示來學語錄十二為今辯受具海雲禪藻集一今辯傳云至匡廬參天老人庚子還雷峯受具茲據辯撰丹霞澹歸禪師語錄序云戊戌受具雷峯親承儀範繫於本年遣足兩今嚴赴嘉興請藏海雲禪藻集三今嚴字足兩順德人姓羅名殿式字君奭諸生弱冠求生死大事己丑脫白受具居雷峯丈室最久與王邦畿黎延祖時相過從請藏歸至歸宗寺閱藏一周歿於五乳峯靜室著西窗遺稿張康之安國與比丘自逢在東莞之篁溪創芥庵為和尚法筵時今釋居芥庵安國與徐彭齡為釋三年閉關計築臷庵居之和尚作小除夕示澹書記詩有我歸自棲賢晤別猶草草臷庵一月談投機恨不蚤句詩集三徧行堂集東莞縣志金堡傳張安國字康之東莞人隸張家玉麾下為別將家玉死率所部三萬人居東莞新安間永曆時晉都督同知後逃於禪與天然今回為友天然有詩贈之自逢為芥庵監寺十餘年今無有為自逢監寺舉火文徐彭齡東莞人恩貢生兆魁子永曆十三年順治十六年己亥一六五九五十二歲今無還抵雷峯和尚有喜阿字歸自瀋陽詩詩集十一光宣臺集九與王子京書五月今無呈偈曰手劃高旻枉自癡可憐積刼滯鬚眉今年競渡過三日晚課隨人瞌睡遲和尚印可之有喜阿侍者呈偈用韻示此曰忘醜憐兒老更癡歸來還汝舊鬚眉雷峯佛法無多子踏倒方知覺悟遲據手蹟藏台山黃氏小畫舫齋語錄詩集光宣臺集皆未收古雲撰今無行狀謂無呈此偈和尚遂命首眾敘次在瓊海歸後瓊海當為遼海之誤首眾事詳康熙元年譜內雷峯舊飲河水河通潮性鹹一眾苦之十月鑿石得泉味甘而多命名冬泉作詩誌之詩集十一作壽文玉何公七十一初度序文玉居士七十一歌語錄十二詩集六按歌附小引云己丑說法大雲文玉居士稱白眉故及門諸士多公族詩有結交猶憶十年前十里香花擁法筵句殆作於本年間何士琨字文玉新會人拔貢生歷官至南刑部郎中治獄平允解組歸丙戌冬清兵犯邑城士琨登陴辦火藥賦糗糧城賴以完國亡後隱居玉臺寺是年玉林通琇木陳道忞應清世祖召至京超賢撰玉林琇禪師年譜道忞北遊集通琇字玉林江陰楊氏年十九出家居武林報恩寺順治間召見三次說法稱旨賜號大覺禪師尋乞還天目山加封普濟能仁國師康熙十四年卒道忞字木陳大埔林氏甫弱冠棄諸生薙染於若昧明受戒於憨山清得法於密雲悟奉召入京賜號弘覺禪師康熙十三年卒十一月函可卒年四十九語錄十二剩人和尚塔銘永曆十四年順治十七年庚子一六六五十三歲聞函可訃趨東莞芥庵謁道獨相向啞然其徒乞和尚為作塔銘獨曰非公莫銘若弟也旋返雷峯有詩哭之語錄十二詩集十一有赴龍溪樊郝諸公探梅之約三首龍溪諸子再約黃村探梅阻雨不果波羅舟中南海神廟浴日亭登西臺李木洲故址登海光寺樓諸詩詩集十一按黃村去番禺東郊三十里居人多環山植梅黃登開黃村探梅詩社延梁佩蘭主之見勝朝粵東遺民錄為今覞今沼落髮受具徧行堂續集八石鑑禪師塔誌銘海雲禪藻集一三永曆十五年順治十八年辛丑一六六一五十四歲是年前和尚著有金剛正法眼道獨為作序云達磨大師秉單傳之旨謂二祖曰吾觀此土惟楞伽四卷可以印心至黃梅易為金剛勸一切人受持此經即得見性則知直指人心無過於此自曹溪以後如洞山聰黃龍南汾陽昭中峯本諸大宗師皆以此經為契證希有哉豈可謂文字乎吾子麗中宿植善根玅悟上乘諦觀此論一字一句皆般若之精髓也希有哉豈可謂今人異於古人乎或謂空隱老凍膿猶有鄉情在予何敢私金剛正眼現在具眼者請鑑長慶語錄按塔誌銘謂著有楞伽楞嚴金剛三疏其楞伽心印首楞嚴直指二種己刊惟金剛正法眼未見傳本番禺縣志續志皆未著錄據牧齋有學集補復天然昰和尚書曾有刻本參康熙元年條初春出海幢詩集十一四月道獨由海幢返芥庵七月初七日獨詔和尚曰瘡疾延綿殊可厭惡吾旦夕且掉臂矣和尚泣懇住世羣生可念獨曰吾道有汝重擔可卸復何戀耶二十二日端坐而逝世壽六十二歲八月和尚奉塔於羅浮華首臺之南並手次行狀長慶語錄附和尚撰行狀錢謙益撰塔誌銘按行狀語錄未收繼主華首法席刻有語錄語錄陸世楷序湯來賀至粵訪和尚於芥庵為論儒佛異同之旨塔誌銘未載年分光宣臺集與湯惕庵書云解纜定在何日未能趨別更覺悵然先師翁空隱和尚得公芳名照耀泉石受好賢之報真自不虛何絳不去廬集二文江公傳云辛丑余晤湯公則來賀以本年來粵也十月李孝源永茂鑑湖充茂兄弟以仁化丹霞山捨於今釋嚴事三寶闢為別傳寺同治仁化縣志七今釋丹霞營建圖略說徧行堂續集一負心說咸陟堂文集舵石翁傳南雄守陸孝山世楷護法之力最鉅焉曝書亭集七陸公孝山墓誌銘李永茂字孝源河南南陽人天啟乙丑進士初為溶縣令崇禎初官至僉都御史弘光末巡撫南贛與弟儀部充茂買仁化丹霞山為避亂之計永曆初拜吏部尚書文淵閣大學士旋乞歸入丹霞山中卒諡文定後充茂携家返里遂捨為寺祝髮受具名今池字一超徧行堂集喜得丹霞山贈李鑑湖山主云弟兄不負二難名賓主須留三到跡論功若敘魏無知大書莫漏汪罇石自注云漢翀別號吾由漢翀始知此山本末按中洲草堂集十三酒酣贈汪漢翀工部自注云曾為番禺令據廣東通志職官表云汪起蛟河南南陽人貢生順治三年番禺縣知縣即其人此山中掌故附記於此陸世楷字英一號孝山浙江平湖人丙戌拔貢生初授平陽府通判順治十三年自登州府同知擢南雄府知府有政聲修輯郡志捐建天峯書院於府治東又建龍護園為丹霞下院買田以贍課諸生歷十九載以憂去官禮天然為居士名今亘著越吟晉吟齊吟種玉亭詞踞勝臺詞今嚴請藏經歸今音卒番禺縣續志三六今釋撰雷峯海雲寺碑記海雲禪藻集二是年詔遷沿海之民徙入內地五十里乾隆番禺縣志康熙東華錄雷峯置田多被沒徧行堂續集三雷峯乞米疏十二月昭宗為緬人執獻吳三桂軍前翌年被害於雲南南明史綱聖祖康熙元年壬寅一六六二五十五歲春再至新會暇園說法有語錄並作暇園留題詩語錄二詩集十二及自作象讚語錄九三月出主海幢光宣臺集五復海幢放生社序有語錄語錄一遣侍者今覞入金閶撰書幣乞錢謙益作道獨塔銘謙益覆書曰金剛眼西樵錄諸書錯列經笥如奉圓音提唱林間錄畫龍點睛便欲飛去竊謂宗家綱要無如永明宗鏡即心即佛遮表二詮華首印證若合符契和尚既提倡林間何不用此例提倡宗鏡令宗海中金剛眼睛一一透底點出何快如之語錄十光宣臺集十五有學集三六華首空隱和尚塔銘有學集補復天然昰和尚書獨漉堂唱和集按錢謙益書云金剛眼已見順治十八年條西樵錄未見傳本付今無大法立為首座並銘竹篦子授以偈曰喚作竹篦則觸不喚作竹篦則背雷峯今日重拈惟有阿兒不會且教舒卷隨時三十年瞎卻天下人在海雲禪藻集一按古雲撰今無行狀謂其二十八得法時為順治十七年庚子又謂自瓊南歸後再依雷峯一日晚課呈偈云云峯印之命首眾壬寅主海幢惟呈偈為順治十六年自遼歸後事時無年二十七又無自瓊南歸為順治十八年辛丑事見光宣臺集二十寄答足兩詩序時無年二十九互有牴牾無撰徧行堂文集序云壬寅余領眾海幢監院解虎六十又一壽序云十年以前為師友道義所牽遂有付受首眾之事今十年矣解虎今錫字萬曆三十九年辛亥生康熙十年辛亥年六十一上推十年正為壬寅又無撰解虎錫公塔銘拓本云予壬寅分座首眾僧於海幢海雲禪藻集一云無回渡瓊海歸雷峯付法首眾僧於海幢示偈云云壬寅無年正三十所謂三十年正相合也又付今覞大法並銘竹篦子授以偈云體露金風莫可追相隨來也又奚為暗明鑑盡無遮護獨荷全機賴石兒為和尚第二法嗣徧行堂續集石鑑禪師塔銘海雲禪藻集一六月二十日和尚以智母師太病趨雷峯侍藥七月二十日示寂世壽七十九歲病中恩愛頓絕一意西方嘗夢睹慈相或以全身投蓮華中香極而醒臨化數日顏色光怡無痛苦狀念佛至氣盡語錄十與澹歸監院書光宣臺集十智母師太塔誌銘有與澹歸監院書語錄十康熙二年癸卯一九六三五十六歲壬寅癸卯間促居雷峯旋徙芥庵有語錄因今無今覞請益唯識謂宜本楞伽遂疏楞伽心印四卷撰自述云楞伽山名此山純以楞伽寶成故以寶名山山在南海夜义所居因其王請佛說法山上又即以山名經棗柏大士云此經於南海中楞伽山說如來道經山下羅婆那夜义王與摩帝菩薩乘華宮殿來請如來入山說法其山高峻下瞻大海傍無門戶得神通者堪能昇往表心地法門無修無證者方能昇也下瞻大海表心海清淨因境風轉識波浪動達境元空心海自寂心境俱寂事無不照猶大海無風日月參羅煥然明現此經為根熟菩薩頓說種子業識為如來藏異於二乘滅識趣寂亦異般若修空菩薩樂空增勝直明識體本性全真便成智用如彼大海無風斯境像明徹心海不搖境風非別但能了真即識成智棗柏固深悉楞伽宗趣也此經初譯自劉宋求那跋陀羅成四卷名楞伽阿跋多羅寶經至元魏菩提流支復譯成十卷名入楞伽唐實义難提與復禮等譯成七卷名大乘入楞伽唐譯簡切終不如宋譯高古奧渺故自古及今猶從初譯梁武時達磨大師航海至魏壁坐少林因授可祖法曰此土唯楞伽四卷可以印心並以付汝自是楞伽遂為宗門秘密今禪者空疏至有生平未嘗展卷可歎也求之義學惟洪武初宗泐如玘奉詔合疏萬曆末德清筆記崇禎中智旭義疏外此不少槩見達磨大師嘗曰此經五百年後翻為名相之學諦審斯語良深慚悚大師蓋謂吾宗失傳豈異人事哉昰自順治辛丑先華首示寂明年先大日相繼謝世壬癸兩載生趣頓盡促居雷峯旋徙芥庵乘茲夙志兼酬禪問聊以自悅未敢示人惟念道法濫觴所謂見性幾同神我透脫一路無異冥初不自生非不生聖言具在乃有不達緣起究墮撥無任情壞法較之拘滯名相功罪又相徑庭也此經直指種子業識為如來藏實有迷悟不則以流注為自心反成生識之過疏中深切著明惟先血脈所引經論但取入理之近互相發明至於機語猶切矜重夫機以轉有言之關捩教以導無言之指歸正在深談不辭明破而徒以剿絕之路溟涬真詮誣罔名言烏焉成馬此時禪病所為真贋難辨也我大師首創無言並傳四卷區區隱慮昰請與天下後世仰奉慈旨爾語錄一原書自述今無撰緣起十二月六日為徧中居士寫鑑智禪師信心銘十二紙並為之跋跋云癸卯臘月六日大雨掩室取徧中居士卷書此居士於吾門最誠慤雖學道因緣尚屬初機然正欲其常置案頭時一省覽與文字般若沁入既久當有瓜熟蒂落時節也據原蹟魏善伯際瑞有與麗大師書云某於大師如檻猨籠鳥瞻依鳳舍弟歸具述論緒佛法祛魔正可護佛法某雖蹇駑有鞭策矣魏伯子集二魏際瑞初名祥字善伯號伯子寧都人明諸生性敏強記於兵刑禮判律法諸家皆窮析原委嘗客浙撫范承謨幕以才稱死於劉大任之難著魏伯子集魏禮字和公又號季子與兄際瑞及禧稱寧都三魏弱冠補諸生生平好遊足跡幾遍國中所至必交其豪賢著魏季子集嘗以康熙元年壬寅來粵以癸卯歸故繫於此康熙三年甲辰一六六四五十七歲四月初八日付今摩大法為和尚第三法嗣海雲禪藻集一並銘竹篦子授以偈曰背觸非遮護巍巍古道存十年行有地一日契無言影草手中眼吹毛身裏門規模鎔盡易須念爾兒孫按此竹篦子舊存海雲寺余藏有拓本欵署甲辰浴佛日銘付摩子天然語錄詩集均未載中秋前五日楞伽心印刊成今無為撰緣起光宣臺集年月據原書九月彭羨門孫遹訪和尚於芥庵有遊篁村入芥庵謁昰禪師一首詩云欲買深山計未能虛名十載總無憑入林且訪經行室浪跡真如自恣僧花院風微生夕磬雲峯葉落見秋燈此身但得辭塵累洗鉢焚香亦自應宿芥庵呈昰禪師二首詩云雲山偶作南中客杖笠初從物外遊滿院寒香仙桂發一林疏雨玉梧秋已知世味同芻狗便解機心近海鷗願乞巾缾為弟子他年追侍碧峯頭其二云雲水襟期總自同繩牀玉塵見宗風秋生夕籟高林外人在山堂細雨中心境自憐空未得思維已覺路將窮重來證取無生義相約明年荔子紅又奉酬昰禪師見貽之作二首詩云竹院無人諸境寂翛然已自出塵遊瘴雲近海孤村暮寒雨生潮片葉秋信宿微言還得象行吟心事欲盟鷗春前趁取芒鞋健直向羅浮最上頭其二云何肉周妻累不同幾時林下暢元風諸天說法花時現片語當機日可中白社但能傳慧業青衫誰復怨文窮塵緣未了空歸去惆悵篁溪夕照紅南𣶂集一彭孫遹字駿孫號羨門海鹽人順治進士康熙博學鴻詞第一授編修歷官至吏部右侍郎工詩有松桂堂南淮香匲唱和等集今無今覞集前人遊覽棲賢記載與和尚山居時詩若文為棲賢詩文彙集一帙程周量可則為作跋海日堂文集不載年分中有壬寅一至其地及和尚旦暮將返湓城語可則以甲辰入都當為本年間作和尚有復程周量中翰書語錄十無年分海日堂詩集四生日感懷二首有記得本師留偈別句次甲辰秋免喪赴都留別羊城諸親友詩後所云留偈即此書也參康熙十二年條程可則字周量號湟溱南海人順治辛卯舉人壬辰會試第一庚子應閣試授撰文中書累官至兵部職方正郎出知桂林府卒於官康熙四年乙巳一六六五五十八歲奉智母師太靈骨窆羅浮葫蘆嶺之原琢石建塔命今無為塔上之銘光宣臺集十智母師太塔誌銘謂師太示寂三年及無少趨法庭中間十七八年語十七八年疑十六七年之誤彭孫遹有擬同昰禪師入羅浮縱觀金沙玉鵝之勝會以事留省下未果斯約作此奉訊一首詩云羅浮古洞天萬仞青蘢蓯欲從白社侶遠叩神仙宮左挾軒義叟右呼葛仙翁如何混塵𡏖坐令此願空試問飛錫人何時去山中金沙水碧流丹灶春泥融石竹翠無恙芳蘭抽幾叢霞峯洵可樂幽陟孰與同悵焉不成往徜恍心何窮南淮集二秋有汰僧之議光宣臺集十八相江歎序今無有上和尚書曰時事如浮雲蒼狗旦夕變更懸仰慈座不勝神馳東官外縣可無喧擾今無領眾來時以業重為門牆忝中夜誓志事未從心今又遇此境謹株守不動倘大决裂始退還雷峯乃作良圖和尚勿過慮已後不必遣僧途次大艱非所慰也大牛海發俱還雷峯諸事足可無虞見一記汝諸人尚未回亦要自不遠耳海幢下元後得百全可以卒歲但食指不止一千俱尋常懸度至於事理之外如今日世事忽然變起則不能如人之念又不可知矣餘鐵機口稟不盡又覆和尚書略曰風波過後痛定有痛難陳於筆謹著古膸口稟光宣臺集九今白字大牛番禺人姓許名凌霄諸生工詩文癸巳皈天然薙髮受具丙申住雷峯建置梵剎發願行募十餘載一夕行乞端坐而逝今桃字見一海雲禪藻集三今儆有送見一桃公還匡廬詩今嚴有九日送見一訶衍入匡山詩語錄示見一侍者有一見桃花更不疑句今無壽見一詩注謂己丑禮和尚受具於訶林居侍寮最久云海發記汝鐵機均見前古膸待考據此可見當時風聲之緊急寺僧之驚惶和尚亦有乙巳冬聞沙汰之令及尹恒復中翰遣公郎兼中持書入山時沙汰寬旨賦此酬之詩有物情纍卵今同昔珍重篁溪石上時句時和尚住東莞篁溪之芥庵也詩集十二尹體振字恒復東莞人諸生弱冠有文名與張家玉相切劘隆武時家玉疏薦未赴永曆初授中書舍人國亡後遁跡羅浮已復逃於禪歸里卒按汰僧之令為順治末年尊崇禪僧太過受天主教之反響官書鮮載光宣臺集五監院解虎六十又一壽序云憶乙巳時方住海幢三載百務未備廷議汰僧相江歎序云康熙四年秋有汰僧之議予自海幢解眾後上丹霞並證以瞎堂詩集乃康熙四年事惟據性統編高峯三山來禪師年譜康熙元年條云夏特旨令天下僧道復民衣公令森嚴列剎莫能守邑令林覲伯素與師善知事勢必改命師闔院勿散但閉門易服以待果三月恩詔降徹剛等編丈雪紀年錄康熙元年條云時泰西天主教穆革我倚許方伯勢諸當道信其邪說有圖廢釋教之舉師有上許方伯席文宗王郡守闢天主教滅佛教書當道公議而止康熙三年條云時秉鈞者奉天主教湯若望仍行左道又有沙汰之說聞玉林國師密札進京欲保存大雄報恩師致書曰既膺一國之寵當此魔強法弱之際正宜挺身利濟俾寧謐海內諸山焉得只顧自己豈稱法門柱石哉據此汰僧乃康熙元年事三年又有沙汰之說而廣東乃在四年或不止一次耶又按道忞百城集二寶奎說云我法孤行世間前有三武之災後有道君之厄時而易僧為德士時而改寺為神霄近而廣督上沙汰之章廷臣下酌裁之議一時僧眾惶駭還家無路填溝壑而道塗者蓋不知幾千焉此說作於康熙九年殆沙汰之議發於兩廣總督盧興祖歟今沼卒和尚有詩悼之詩集八海雲禪藻集三言沼庚子受具年四十五卒無生卒年沼有出家日自嘲云四十披緇未為老庚子年約四十當卒於本年間矣參順治十七年條康熙五年丙午一六六六五十九歲海幢寺始增建殿宇番禺縣續志三六王令撰鼎建海幢寺碑記十月十六夕雷峯本寺被掠翌日作法會諸公擬募田為放生之費乞書冊首詩有半載耕鋤一夕盡句詩集十八臘月受今釋請入丹霞別傳寺主法席釋請和尚作丹霞詩因隨足力所及遊山中諸勝成十二律詩集十二並命諸衲隨意屬和以識一時山川人事之合今無為作丹霞詩序略曰雷峯天老人深於入山之致相隨諸子亦皆骨具煙霞鼉鳴鱉應故其一唱百和如天籟所觸別具幽響非如詞流韻客構雅什於文心逸清言於雲路作區區綺麗觀也光宣臺集六康熙六年丁未一六六七六十歲住丹霞作元日與諸衲泛舟江上中秋前五日與諸衲宿片鱗巖諸詩詩集十二今再建無著庵於廣州小南門之麗水坊時值喪亂之餘鄉閭蕩析仳離窮嫠苦節弱息無歸再從而招之出家在家弟子恒數百人番禺縣續志三六王令撰鼎建無著庵碑記康熙七年戊申一六六八六十一歲住丹霞元旦付今釋大法並示偈曰自到雷峯十六年掣風掣顛今日丹霞捉敗推向人天不教總靠著那邊咦直舉無遮回護途絕正徧休言祗這是難賺豆皮禪要天下古今盡溟滓乎豆皮長處而不知所以然為和尚第四法嗣又付仞千今壁大法為第五法嗣解夏付今辯大法為第六法嗣海雲禪藻集一今壁字仞千東莞溫氏幼通墳典工詩善書弱冠遭國變為僧於鼎湖聞天和尚倡道訶林徒步歸之侍丹霞寮一言之下知解盡脫付以大法辛亥分座海幢旋卒八月今無為撰丹霞天老和尚詩序略曰戊申八月老人手書命今無曰近日禪講稍暇偶為古詩諸子請付梓欲少待之不可汝其序之此老人之逸言微借工部之氣出之者也道人之所以自成其聲以閒裕為牢落以峭潔為壹鬱內華外融不涉境以動情不先詞而後我憑高縱目據梧發聲極雲樹之依微盡禽蟲之鳴變當見其優游夷愉高明廣厚人雖目之曰境無乃非境雖目之曰情無乃非情後情境而共材華呈神鑑而齊聲調使荊卿易水屈原湘江頓變為智河慧海雖有虞氏之南風未足比數而老人微言道韻木葉藏春軒軒自遠又可以尋常作者目之哉光宣臺集五和尚嘗作似詩自序曰說作吼子乞余詩付梓人已而乞名名曰似詩似詩者何謂也夫道人無詩偈即是詩故亦曰詩然偈不是偈詩又不是詩故但曰似吼子請焉更為語曰子以予偈不可讀姑取詩以示人為其近人也何近乎情近也境近也悲歡合離與人同情草木鳥獸與人同境同人者善入入則親親則信信則漸易而不覺矣噫此吼子之說也然予以為吼子之知予詩者唯近而不知予之不是詩者亦為近近者天下之所同也而有異焉然則天下之所為樂近者為其同也而有異則天下之所謂樂一人尤樂予之不是詩是以樂與天下而以尤樂待一人萬世而下其旦暮遇之耶昔南禪師住歸宗時遣化至虔上將還有劉君遠送郊外祝曰為我求老師一偈為子孫世世福田明年南以偈寄之曰虔上僧歸廬嶽寺首言居士乞伽陀援毫示汝箇中意近日秋林落葉多後四十年雲庵復住歸宗法席盛於前雲庵上堂有偈曰先師昔住金輪寺有偈君家結淨緣我住金輪還有偈却應留與子孫傳噫吼子謂是偈耶詩耶固非艱深不可曉而古今傳誦不敢目為詩又安知夫人之所謂近者而即遠所謂遠者而即近耶吾願天下勿以堅白之昧終而自安於所樂是不但一詩也詩集卷首海雲禪藻集三按古詩似詩皆未見傳本和尚示寂後雪木今毬編為瞎堂詩集二十卷瞎堂在海雲寺和尚所居處手書扁額見番禺縣續志今吼為王邦畿山名見順治十二年條今毬字雪木東莞尹氏子童年孑身入雷峰供灑掃辛丑受具選侍寮尋升按雲堂天然七坐道場未嘗少離惟居丹霞時一充龍護園主嘗舉竹篦子欲付以大法屬疾不及待矣康熙四十年至海幢病卒年六十秋疏首楞嚴直指十卷三月而成原書今釋序云吾師宴坐丹霞以三月成直指適屆示生之期當為本年作十月十四日為和尚六十一示生作六十一詩十四首今釋撰解連環甘露降於叢竹時老人疏楞嚴經適竟兼值生辰詞詞云誰釃天酒只此君吸盡西江一口便解衣投入甘泉且痛快澆胸淋漓濡首葉重枝輕更步屧沉酣花柳看漿調玉屑露濯金莖風生碧蕅應知竹林非友喜祥分翠柏慶存黃耇恰堂中疏罷深經似醽醁開新葡萄醞久灌頂醍醐南溟水全傾北斗丐曹山白家餘瀝小人鼓缶徧行堂集詞之三今無自廣州至撰壽序並賦律言示生頌奉祝丹霞本師天然老和尚六十又一壽序云今歲十月吾師天老和尚六十又一覽揆之辰今無與諸山衲子忭舞雀躍將趨座右致人天祝諸山衲子誠懇胥慶輿情踽踽且屬今無為詞以達今無復之曰汝曹念聖世之遐躅欣人天之標致綠髮藉雙足之泥金軀濯九龍之水輝古照今順性起用固當爾爾然老人湛圓深密吹南溟之法雨礱北山之霜鐔援溺砥柱救偏補弊運三才之明幢斂四相之空寂殆天之所以不隤洞上一綫之傳北方童壽西竺戒賢豈計思慮所能及耶又動靜之境不相到譬之餐蜜挫糟鼓頰而甜中邊運斤而勞肘腕識海智海兩皆無涯而用是非相測詎理所有且山龍黼黻羣象昭著碧桃逗春紫芝蝕月一真靡存十虛廓落微動聖智則獨露先乖便爾泬㵳又那邊未到直使執天竺之金函發先王之玉笈雌黃逈遠穎理猶迷纔呈性境則神龍縮項更欲踏翻而靈龜曳尾此則今無二十年執侍巾杖而終無以窺老人汝曹又曷得而祝耶老人日坐萬峯機停歲遠主持斯道以壽天下正且未艾汝曹但志誠作禮勤幡花伎樂之獻毋以祝嘏之詞亂空中五色諸衲子歡喜作禮無亦歡喜作禮戊申初冬望前一日本師天然老和尚六十又一示生人天胥慶華梵交響恭賦律言敬致末祝云五葉回春綠雙輪導瞑流寶壇高宿將芳軌正中區盛世才偏美名山跡屢投圓音通十域至德仰千秋洞水天潢濬宗風地軸留一麟孤玉角四海集金彪慧刃回烟水神針貫斗牛選官江右近遊岳尚平羞聖諦凋人爵囂塵惜馬頭閱人懸至鑑據坐得真吼性相融相攝行藏自可求坐深喧鬥蟻機濶覺鳴鳩逗月苔烟少藏鶯雪樹稠沿流拋楚玉礱石轉吳鈎雷震山常響花明筆盡收急湍抽蚌腹傑石駕龍樓道泰澆風隱巖高瑞氣浮絳霞騰翡翠白塵傲王侯初地稱韶石重來即鄧州鳳林存眼目狐徑種戈矛力勁迴瀾柱風嚴狎水鷗入城卑俗降及室弛心偷白石饒清露彤雲護綠籌松枝生珀軟柏葉應機抽憑檻知無際扶笻豈有侔靈峯猶隱隱貝葉自颼颼側仰孚慈力羣趨慶鶴籌披珠慚異掌飲乳咽乾喉一偈稱難盡三回匝未休梅花呈曙色此意獨悠悠丹霞天老和尚六十又一示生頌云巖巖泰山既溫且哲機圓道擴獅吼獸裂釐剔厖倫辟咡英傑金簇弸出我舊妙楔道耿光正不貴不盛我師振之厥宗是慶靡朕靡兆聾賢瞽聖袖滿摩尼握輪寶鏡雷震於嶽四海知還非烟溪流若月松間博大盛備易仰難攀啟我後人春滿嵩山光宣臺集六十二二四福州士紳林孔石請主長慶法席却之冬囑今覞代往臨別示詩有十年未弛吾師擔三請深慙居士心句並有寄林孔石詩詩集十二冬南雄太守陸世楷同闔郡諸宰官請入華林時龍護園落成為丹霞下院和尚賦詩有太守新修別院深遙分祗樹落城陰句未幾還丹霞歲暮詩有就隱丹峯幾臘殘昨隨人去四旬還句詩集十三海雲禪藻集二今鏡傳按清代文字獄檔徧行堂集案云李侍堯奏檢丹霞志查出下院兩處一名會龍庵在韶州府東門外一名龍護院在南雄城內是年手書法華經七卷並作書後語錄十二康熙八年己酉一六六九六十二歲住丹霞春過桐子山泐山作詩紀之又作丹霞山居十二首有連年頻苦病今夏喜身強六十又過二山林多夕陽句詩集十三有贈角子詩云閒窗愛獨坐禪暇稍吟詩與世真無涉逢人輒解頤幽棲偏得性辛苦勉從師所賴惟多病投艱或可遲詩集八角子名今𪓔為和尚第七法嗣付囑大法當在本年間廣州海幢寺世系表楚庭稗珠錄四按今𪓔新會黃氏真佛今如子見海雲禪藻集今如傳道光廣東通志三二八今如傳云𪓔九歲從父為僧不數年遂悟大乘著有語錄行世其受具及付囑大法年分未詳今如受具於順治十年癸巳假定是年𪓔九歲至是才二十五歲耳咸陟堂文集十七代丹霞合山請棲賢和尚啟云惟角公和尚雷峯嫡乳舵石連枝生鍾紫水之靈蚤受丹霞之記似付法在和尚住丹霞時陳子升中洲草堂遺集卷末附和尚書卷子與陳喬生云春日晴暖與西堂角禪宴坐丈室此文為康熙十一年壬子作今辯付法在康熙七年戊申則𪓔付法當在己酉辛亥間和尚作歸宗山籟云院後遺殘屋吾師舊掩關且教𪓔子住吾欲老投閒謂角子也廬山志載𪓔宋大中丞犖留帶七律楊鍾羲雪橋詩話有查他山作棲賢寺阻雨示角子禪師詩則𪓔曾主棲賢法席也作詔復濱海遷民故業三首詩集十三廣東通志邊防篇云臺臣楊雍建巡撫王來任總督李率泰先後疏請康熙八年春正月奉旨盡弛海禁清史稿鄭成功傳云康熙六年徵施琅入京師撤降兵分屯諸省嚴戍守界不復以臺灣為意鄭錦兵亦不出相安者數年濱海居民漸復業康熙九年庚戌一六七六十三歲住丹霞刻丹霞語錄上元日陸世楷為作序語錄卷首又刻楞伽心印四卷雍正癸卯重刻本有釋函金跋云心印先出直指八年參康熙十七年條為與安今竟受具使掌書記並贈以詩詩集十三全祖望鮚埼亭集二六今竟字與安姓陸名圻字麗京錢唐貢生乙酉之難匿居海濱有事於越中尋至福州事敗薙髮為僧名法龍字誰庵母作書趣之歸會莊鑨史案發詞連之事白得釋久之遂游粵謁天和尚於丹霞為易名一夕遁去不可踪跡廣東通志釋老傳作今龍誤海雲都寺今湛與在社諸公啟乞和尚撰海雲寺放生社置田碑語錄十一番禺縣續志三六是年間重建韶城會龍庵為丹霞下院和尚有得澹歸病即愈之訊時會龍擬新構走筆寄之詩詩集八徧行堂續集五重建會龍下院疏康熙十年辛亥一六七一六十四歲住丹霞作初春與諸衲游黃竹坑詩云春遊老覺步行難弟子肩輿過遠山自是大家新歲聚一年惟有此時閒詩集十三蓋諸僧以力耕為食也六月今無作丹霞老和尚楷書後跋云丹霞老人禪悅暇間作字今年六十有四而喜書此小幅精到健媚殆烟雲泉石之致為慧光渾融所用道韻深穩非小技雕蟲可能彷彿者宜其月滿千峯鐘鳴獨院法雲深處一座巋然而能使霜顱螺頂之侶胸中如灑計此丰神當與趙州南陽問法臘而指庭樹也覿承禪人代依石持來索跋拜閱之餘輒增私喜光宣臺集十和尚有送依石下山兼訂復來詩其書法南宮海雲諸子皆受其熏染也十月林宛君上達有辛亥陽月集海雲寺祝丹霞老人壽留宿山樓却賦詩詩云花香筵畔擁人天祝頌多從舊寺邊牛火遠依丹壑老獅絃高唱玉淵禪鏡深鶴語林光薄雲靜松枝海色連閒倚山樓思何極寒宵千里月團圓海雲禪藻集四林上達字宛君番禺人諸生禮天然為居士名古贄字縷白是年為和尚寫刻梅花詩之鐵關古鍵登具於雷峯海雲禪藻集三海幢寺刻古鍵寫本天然和尚梅花詩古鍵字鐵關順德胡氏子庚戌年十八出世雷峯明年登具為阿字無掌書記尋充典客卒於雷峯按語錄十二詩集十九二十為梅花詩雪詩依平聲韻為五律七律七絕各一首雪詩未見單行本禁書總目著錄丹霞雪詩僧古翼撰古翼字輔曇為王隼僧名邦畿子後返於儒工詩著大樗堂初集而無雪詩考王隼為僧在康熙八年己酉至十四年乙卯凡六七年見集中己酉仲春由雄州入晉安及初歸省母諸詩其時和尚正在丹霞全燬書目云丹霞雪詩前明僧人古翼錄內一先十五咸五歌六麻四詩違礙今檢和尚雪詩七律一先有潔清亦許隨芳穢流亂何從數後先句十五咸有欲湧波濤翻日月石留青翠覆松杉句七絕五歌云眼前浩潔凌晨早傾耳希聲清夜多漸入春郊花氣暖寒庭誰解泣銅駝六麻云破衲蒙頭老歲華寒深時亦動長嗟古來甲子朝門外亦有幽蘭哀日斜所謂違礙似指此也竊疑丹霞雪詩為和尚之作古翼寫錄付刻翼楷法鍾太傅與古鍵寫梅花詩為伯仲本禁書總目改錄字作撰一字之差大有關係幾忘其原作者矣附記於此秋南康太守廖昆湖文英暨歸宗闔寺大眾啟請和尚主席廖人也燕有集丹霞古寺同諸子送天然和尚歸廬山詩詩云丹霞久住露元機又背蒲團下翠微一榻坐穿塵外去千峯行盡雪中歸路經橫浦同鷗宿身上廬山看瀑飛此去春風吹正好蘑菰新長蕨芽肥廬山志本傳引江西舊志中洲草堂遺集卷末咸陟堂文集舵石翁傳粵東詩海六三十二月抵山作初住歸宗四首並有語錄詩集十語錄一廖文英字百一又字昆湖連州人官南康府知府著石林堂集廖燕字人也號柴舟曲江人諸生著二十七松堂集十二月今壁卒和尚有詩悼之詩集十三徧行堂續集八仞千壁禪師塔誌銘按海雲禪藻集一作己亥卒誤康熙十一年壬子一六七二六十五歲住歸宗時負笈稱盛光宣臺集十二雷峯天老和尚七十示生頌正月初四日登金輪峯禮如來舍利塔因過道獨掩關處有題塔院四首及初春陪廖使君曾文學遊玉簾泉寄阿首座諸詩詩集十三十八並應今覞請至棲賢說法有語錄語錄一春陳喬生子升至歸宗子升有歸宗寺呈天然和尚詩詩云四十年前恨不同高山忽仰客途中面當真處纔云識心待歸時更叩空墨偈字彯池水淨雪房爐射殿燈紅欣從兩世師承地况自曇摩海岸東中洲草堂遺集十四並乞作優婆塞和尚為陞座畀以偈書卷子與之別後有寄喬生書一通卷云智山居士即陳喬生予四十年前聲氣友也予與黎子美周少年時為莫逆交美周又與喬生為莫逆交出世來形跡隔絕而心中常有其人後聞皈依先師法名今住字草庵而心中之人較切離亂之後去住難覓予前六年自雷峯徙丹霞去臘又從丹霞入歸宗春日晴暖偶與西堂角禪宴坐丈室有投刺索見者則心中之人忽在目前握手歡甚輒云歸去既恨相失之日長而又嗟相遭之日短三界旅泊韶光難駐謂我輩相期安得更有第二事耶智山臨岐乞作優婆塞為之陞座並畀以偈偈曰三界無安猶如火宅兒嬉不知出入馳突梁棟傾圮朝不遑夕長者徬惶諸子豫懌惟有一門道路孔窄捨此別無當慎决擇古今聖賢斯道是適道以戒先性戒自律勿隨順流與世汩汩囑我陳子惠迪厥吉書云山中一日風味儘公受用蓋欲公退而思之家食知足不為將來裹足之由則坐進於此矣大江吟讀至過虞山一首直追古作者近時詩多新聲唐韻寥寥矧其尤耶公但學道持戒一如其詩斯老僧所為加額也再會何時願毋忘昰中洲草堂遺集卷末按兩文語錄未收故備錄之陳子升字喬生南海人子壯弟府學生工詩與子壯黎遂球諸人修復南園詩社弘光間以明經舉第一隆武改元拜中書舍人永曆時拜兵科給事中肇慶陷乃歸里初禮道獨晚入青原廬山受居士戒歸後杜門不出著中洲草堂遺集作歸宗山籟一百四首自序云我宗無語句亦無一法與人矧文字乎惟是法運衰晚真悟人少聰明人多以聰明之資久侍知識從垂手處揆之一千七百則若向上若向下若門庭設施若入理深談識解依通往往微中而真悟之人反見樸拙故予謂六祖大師與雪峯雲門諸老若值文勝之日未有不當面錯過者真人之不易識時習蔽之也年來痛戒門下除舊習魯論以其所近應酬世諦姑不在禁若早年剃落少一習氣便是多一便宜猶耽耽不已真可謂舍其田而耘人之田矣吾道貴悟明心地耳古云離文字相離心緣相使其獲自本心盡天下人目為不通文不達理亦復何愧老僧固曾習魯論者設禁以來不作詩文三年於茲矣自歸匡嶽乃有山籟由其天有所甚樂故其籟有所自鳴也天籟貧故其籟以貧鳴天籟拙故其籟以拙鳴貧與拙皆山性也性既山其籟亦山是山籟所由發歟世有愛予山籟或不罪予先自犯禁且即以此而與天下士守禁益篤是為善讀山籟者詩集九今遇謁和尚於歸宗一見契合遂結茅於寺後旦夕入室針芥相投咸陟堂文集六澤萌遇禪師傳康熙十二年癸丑一六七三六十六歲住歸宗秋病甚冬今釋至匡山省視咸陟堂文集舵石翁傳程可則出知桂林府有寄本師天然和尚二首詩云浮雲出岫巔捲籜下林表俱為風所驅何時返圓嶠伊予本孤生嬰患在少小幾為俎上臘幸脫樊中鳥二十謬通籍三十游鳳沼四十直省闈於斯守炎徼素衣化為緇風塵汩昏曉本無文采具受此虛名擾禪榻久寂寞鬢毛亦將老蒲柳感秋零聞道苦不早其二云聞道有宿懷舍師更何似搖搖塵網中大覺紛誰是憶昔登海幢瓣香拜南指全體有大用盲目而聾耳原注師昔示偈云愚目聾耳之塲即上哲全體之用人海雜喧囂歌哭失至理未能守空山徒然三復此扁舟望匡廬咫尺烟霞紫扉履不可留慚憂渡湘水海日堂集一十一月吳三桂在雲南抗清自率兵攻湖南各省平定三逆方略一康熙十三年甲寅一六七四六十七歲住歸宗有新春偕澹長老遊玉簾泉詩詩集十四今釋亦作齊天樂詞紀之詞云摩天峭壁無門入誰將玉簾低掛石榻聞濤晴窗看雨莫覓龍潭高下金輪忽駕映一朵卿雲紛綸嬌姹讓出扶桑水中生火不能畫人人同注異指見烟飛電閃如幻如化綠暈燈兒白光珠子青赤虹橋斜跨歡情未罷便空裏栽花方開方謝剩有餘輝繞雙眸激射原注懸泉如練見五色光變化恍惚因人指注而為名狀蓋月色所映耳徧行堂集詞之三又為釋作徧行堂集序語錄十二按序無年分徧行堂集詩文編至甲寅年止本年遊匡山故繫於此七月退院住棲賢卜隱紫霄峯之淨成未誅茅而南康有警時耿精忠在福建與吳三桂會師攻江西冬乃至三峽寺避亂入嶺作退院十四首有到處相逢說入廛不因多病不知年句自注云老漢平生供狀及生日前一日聞南康戒嚴詩詩集十四平定三逆方略十番禺縣續志三六海雲寺放生社置田碑康熙十四年乙卯一六七五六十八歲住雷峯有乙卯人日酬樊月藏孝廉並寄大願文學時予初還雷峯與諸衲赴大石李村啖荔之約喜澤萌來自開先並示塵異諸詩詩集十四樊應元字長文番禺人乙酉舉人禮天然為居士名今鷺字月藏大願疑為其弟瞎堂詩集有壽樊大願五十一詩云我愛樊道人皆醉而醒獨壹志在西方而未嘗離欲高齋來南薰梵音響村屋田園樂有餘豈更羨山谷亦禮和尚為居士者陳子升有聞天和尚自廬山歸雷峯喜賦詩詩云日照金輪峯遙瞻方丈容風生錫拄杖歸撥海門松忽慰三年別初為兩地逢願教鼙鼓息齊叩法堂鐘又作喜天和尚自廬山歸雷峯詩詩云四十年中泥望雲三年前謁又萍分何期耶舍寺中語還向雷峯鐘後聞滿地豺狼難塞路一天龍象肯離羣鄉園幸附匡山侶羞號青蓮與右軍一中洲草堂遺集十十四康熙十五年丙辰一六七六六十九歲住雷峯鄺無傲日晉捨磊園作禪林請和尚主社題以詩龐嘉耋招遊弼塘之亦庵嘉耋捨為淨社亦有詩紀之詩集十四海雲禪藻集四咸陟堂文集十八募化重修亦庵記鄺日晉字無傲一字檗庵南海人官總兵廣州陷張家玉起兵東莞日晉率所部為響應晉都督同知國亡禮道獨為僧名函又字安老晚踰嶺北遊為九疑尊宿少與黎遂球遊其子延祖刻蓮鬚閣集乞日晉繪像於卷端亦工畫也是年吳三桂分兵攻惠州肇慶逼廣州二月尚之信劫其父可喜抗清和尚作秋興八首時萑苻遍地海幢寺亦遇剽刦詩集十四平定三逆方略二一二三番禺縣志前事略光宣臺集十九今無撰解虎錫公塔銘拓本康熙十六年丁巳一六七七七十歲住雷峯今釋為撰首楞嚴直指序並應釋請以定本直指寄丹霞山中釋即與今辯較閱發寫謀付剞劂原書序無年分徧行堂續集十上本師天然和尚書云曩蒙慈諭撰楞嚴直指序未敢輕易頃始讀全稿僅得成篇錄呈法眼此書乃和尚住丹霞所撰聞有謄真本取去歸宗有所增刪幸賜發回俾今釋獲睹全璧又貯之丈室永鎮此山且欲稍集因緣付剞劂以公諸天下萬世也前屈樂說為首座力勸不從蓋其意不忍竟離和尚亦恐被丹霞法席粘住耳又書曰去臘得慈諭並直指定本即與樂說較閱發寫每讀之但見其不可思議故非游夏所能贊一詞也樂說行解相應終當以此席累之年運已往前路無多荔子之緣遂絕俟入夏又看江舟消息也按戊午今釋以丹霞院事付今辯六月出嶺見澹歸年譜前書當作於丁巳後書作於戊午故繫於此十月迹刪成鷲作天然和尚七十頌一首詩云拙哉大撓作甲子不識太初與無始却教三萬六千日忙煞山僧希作佛豈知賢聖中所存一朝坐老天地根七十年前無此人眾人道假我道真七十年後稱壽者眾人道真我道假真假兩不知請問天人師今夕雷峯好輪月不異匡廬夜靜時咸陟堂集二成鷲字迹刪俗姓方名顓愷字麟趾番禺諸生明亡後父國驊既歿別母學佛於鼎湖晚棲大通寺工詩文書畫著咸陟堂詩文集鼎湖山志陳元孝恭尹作壽雷峯天然禪師一首詩云孤高如月萬方看至道無言仰頌難垂老尚聞勤梵行太平早已薄儒官身為碩果時方剝書滿名山墨未乾曾住朱明洞天上仙人不敢愛還丹獨漉堂集四陳恭尹字元孝順德人邦彥子諸生永曆時以廕授錦衣衛指揮僉事廣州陷北遊觀變者三年歸未幾又踰嶺欲入滇道阻不得達乃返里賣文為活工詩文為嶺南三大家之一著獨漉詩文集今無作雷峯天老和尚七十示生頌十首並序序云流霞沆瀣潤大地之靈芽石腦金丹奉雲中之壽佛吾本師天然老和尚大智獨圓神珠並朗現爪牙於獅座洞徹心胸談半滿於尨宮聲齊妙諦繼日者月萬古流輝弘道者人一時莫匹久稱標表人天深能融渾魔佛丹梯千尺神鼎失其孤高白水一盂浮山折其苦辣今歲丁巳孟冬壽邁古稀四眾瞻雲唄梵胥慶今無舞忻不能仰讚一詞僅追憶執侍已來中間離合之槩與老人行住之因成示生頌十首他日年齊寶掌韻越南陽回視曩緣不妨作太古觀耳詩云菩提月滿萬山秋卓卓金針映碧流誰向風旛酬妙義飄零窮子未曾收原注今無十七歲時珠衣未繫傭倩為艱老人方坐菩提樹舉唱宗乘因投座下問法風旛慶睹法會之盛此己丑春事也其二云蕨藜栗棘恣鉗錘嚼碎崑崙事未奇七日貓兒方大叫雷峯松柏影參差原注庚寅辛卯廣州烽火而雲山無事某於此歲月醉象犬馴取裁無所辛秋而後頑石可鞭猩唇欲轉學隨鹵莽悄畏趙州不足以當一大噱也其三云嶺路梅花江右村棹深湖月總無痕金輪倒射歸宗影日午羣峯正閉門原注癸巳秋嶺海流氛孔亟老人拂衣故山匡嶽雲霞嘉遯尤快吟徹庾關吉贛豫章蠡湖之月然後掩室歸宗白雲盈門黃獨香火南公聞蟻鳥巢吹布道力既深山川增勝至甲午秋始移居棲賢今無執侍竊謂於諸子獨深其四云浴龍池上合同堂四代兒孫起大方玉線錦縫綿密處五宗調奏別宮商原注甲午冬為博山老祖八十壽博下兒孫會於祖山長慶師翁自閩往天界浪和尚自浙往三宜盂和尚自吳往吾老人自棲賢往入高曾之堂奧見高曾之規矩老人經理博山讓浪和尚主席隨長慶師翁退住高泉諸方聞吾家遜讓之風稱為有禮兩耆亦云如再老祖之教紹云其五云五老峯前一句齊氣吞湖海萬山低冰天不見人歸處鴨綠波翻入虎溪原注冰天絕域丹梯莫上哮吼獅子道邁寰中而以義烈之氣蹈子卿之跡即非友于能不感繫今無一言許以馳驅孤笠下棲賢騫征而往者此丙申夏仲老人見懷詩有云望歸空記出門時實一時可愕之事也其六云帝城宮闕望慈雲獨立燕然數夕曛北去南來看塞雁峯頭獅象愧成羣原注今無與千山師叔處大窖中風沙慘黯或長嘯高歌或流涕覆面一以憂患餘生一以冰霜殘売情諧水乳鱉應黿鳴於其將歸師叔強留無曰留之可也然斯時不南即前日之來此耳遂義消情岳口燕京中間恭懷南北可寫其七云鯨鯢吹海綠波深十石沉香爇此心恰似老人趺坐處瓊山月色可誰尋原注南人未南而北復南矣思南遊然南之遇風波宵小與甲兵盜賊不亞於黃沙黑水豺虎鵂鶹此瓊山仙島罕有多至者玄虛無著吾宗豈取坐至者耶可以切喻其八云鸞溪還復振獅踪日繞簾泉十萬松却為北行瞻泰岱慈風吹遍玉芙蓉原注老人出世鸞溪三入鸞溪乃主法席壬癸之交負笈稱盛今無亦以癸丑冬趨省鸞溪乃為宋方伯拉入都門中途阻亂遂上泰岱因恨不久住鸞溪為此虛設也其九云高涵海月挹秋光萬頃鴻濛坐渺茫只有太平豐盛事不須野老歎維桑原注甲寅劫風震蕩矣古德云國家興亡野老嚬蹙老人從匡廬間道歸雷峯而福座所臨處處桃花武陵可泛道人無事外之理當不許野老歎維桑諸子欲以匡雲為海雲老人曰否今無又似五千退席不敢置喙耳其十云蒼生演劫見金仙鶴語松濤集曉煙一粒火齊焜燿處道山鐘鼓自年年原注南陽趙州古稱壽者吾師正演丈宗玉振金聲福智超越所以云喻者蓋今無及後昆之卑智慶企之私耳光宣臺集十二李鴻子廷標作壽天然和尚二首詩云仙城問道早逢師髫齔從人學語時屈指已嗟承教晚寸心長向夢魂遲大年豈盡虛空劫現世猶親古德遺倘獲向平酬宿願玉淵金井好追隨其二云七十年前閒了忙畫堂清晝擁縹緗由來海國欽人瑞千古風流頌法王晴闕曉煙籠旭日丹霞甘露綴松篁從今醒却浮生夢長奉天然一瓣香海雲禪藻集四李廷標字鴻子番禺人貢生禮天然為居士名今晴字逈無十一月手書雷峯海雲寺放生社置田碑古機刻石嵌寺壁語錄十無年月余藏舊拓本末有後記云廬山紫霄天然昰老僧於康熙丙午臘月在海雲受澹歸釋子請住丹霞越四歲庚戌海雲擬置放生田湛都寺與在社諸公啟乞前文明年赴廬山歸宗又三年甲寅七月退院卜隱紫霄未誅茅而有南康之報自三峽寺避地入嶺復居海雲以今丁巳冬十一月書石時余七十矣布金購田詳具碑陰比丘古機刻鈐匡廬山長印此碑在海雲寺大殿西廊番禺縣續志金石略著錄頗多闕字蓋乾隆四十一年今釋徧行堂集案發寺僧懼禍輒將丹霞及澹歸等字刓去詳見清代文字獄檔古機生平待考臘月付今遇今但大法為和尚第八第九法嗣按今遇為和尚第八法嗣見廣州海幢寺藏世系表咸陟堂文集澤萌遇禪師傳云天然主法歸宗公一見契合後返雷峯乃受付囑當在乙卯丁卯間矣徧行堂續集十與樂說辯和尚書云程達庵云臘月老人付法二子殊可喜慰口號奉寄有又報新生兩法王誰家兄弟沒爺孃句書中無二子之名又與塵異但大師書云老夫耄矣孤負老人付囑喜見英俊為吾門昌大不禁起舞也小詩請正並寄拙集一部非敢充賀或可與春禽秋蚓共一賞音耳廬山定必侍行相見於湘江凌水間知不遠矣又十四有賀澤萌遇西堂秉拂海雲及賀塵異但侍元秉拂海雲二詩編在輓旋庵湛都寺詩之後今湛卒於丁巳和尚以戊午入廬山今釋以戊午請藏出嶺故書中有相見湘凌之語則今釋書中所云二子當指遇但二人其付法亦在丁巳臘月矣海幢寺藏世系表列但為第十今攝為第九法嗣惟海雲禪藻集一謂今攝以庚申得法在遇但之後證以釋書言二子同時付法則但為第九攝為第十明矣徧行堂續集載釋庚申臨歿時於平生師友如天然今無今摩今辯今𪓔今遇今但皆作書贈物留念而未及今攝則其時攝未付法也攝卒康熙二十五年今但年壽最高卒雍正間世系表遂誤列攝在但前耳康熙十七年戊午一六七八七十一歲還廬山泊彈子磯遇提督嚴自明奉召入京招和尚同舟作舟次別嚴公詩有共載江流兩月閒句閏三月抵棲賢詩集十四徧行堂續集八棲賢石鑑覞禪師塔銘廣東通志五九職官表云嚴自明陝西人武生康熙九年任廣東提督清史稿吳三桂傳云嚴自明明參將降從總督孟喬芳征撫陝甘又擊張獻忠破桂王有功授三等阿思哈尼哈番之信初叛自明附之之信遣攻南康敗走南安先之信降授鑾儀使病卒作秋蟬四首有序云廬嶠初還新構未集僑寓三峽寺之雪泥爪日坐長松下蟪蛄徹谷哀音動人偶憶露重身難進風多響易沈之句不覺慨然情異世殊均有所寄天籟待發因感成聲詩集十五築山樓於紫霄顏曰淨成精舍作淨成閱工中夏上巢雲秋日遊白鹿洞遊凌雲遊玉川門諸詩又題三疊泉二首並勒諸石詩集十五康熙廬山志六傅竹君宏烈捐資刻首楞嚴直指十卷今辯為撰緣起原書今辯撰緣起無刊刻年月卷末有太子太保撫蠻滅寇將軍巡撫廣西都察院右副都御史進賢傅宏烈捐資全刻三十一字長方牌據平定三逆方略康熙十六年五月乙酉命傅宏烈為撫蠻滅寇將軍十八年十二月甲戌詔將軍巡撫傅宏烈率兵進勦恢復滇黔諸處其粵西巡撫事命麻勒吉姑行署理十九年二月大將軍簡親王喇布奏二月二十八日至永福聞馬承廕反紿傅宏烈登舟兵襲其營是此書當刻於十六年至十八年傅宏烈巡撫廣西任內又據徧行堂續集十與樂說辯和尚書云豁大來得手書極慰老懷竹君自是快人可愛可敬也直指每卷後列銜但今釋已作前序吾弟作一後序為緣起具述竹君高雅率拔之風更有情致刻成裝釘與豁大賫送也聞印書已得百四十部便將百部於月初發來得伴即行遲速如意若有伴而更俟書便失算矣頃因棲賢之信亦欲早往廬山過去可痛現在可慮亦如吾弟意也竹君為傅宏烈印書一百四十部指徧行堂集續集十一與戴怡濤憲副書有拙集刻成弟即度嶺語和尚以本年𨳝三月抵棲賢今釋六月出嶺則傅宏烈捐刻直指當在本年今再建無著庵落成番禺縣續志三六鼎建無著庵碑記今覞卒年六十和尚有詩哭之詩集十四徧行堂續集八石鑑覞禪師塔銘康熙十八年己未一六七九七十二歲住棲賢二月初九日作山樓豎棟示諸子及淨成看牡丹巢雲看牡丹諸詩詩集十五八月初七日移居淨成作中秋雙鏡樓與諸子玩月詩有雲裏高樓結構成句又有足疾詩及九日病起登雙鏡樓二首詩集十五康熙廬山志云棲賢寺東有淨成精舍後有雙鏡樓僧函是昰建湯來賀訪和尚於淨成塔誌銘撰許九環詩集序語錄十二按九環為星子令許逸林之父序云許公蒞任星子適余避地廣南去夏還山初晤郡齋當為本年作康熙十九庚申一六八七十三歲住淨成付今攝大法偈曰己住廬山十二年水雲深處落機前於今解進竿頭步穩坐千峰跨九天為和尚第十法嗣海雲禪藻集一按海幢寺藏世系表列攝為第九法嗣然禪藻稱其付法於淨成則為第十明矣參康熙十六年條五月作觀世音像讚語錄九凡六首今台山黃氏藏第三首款署庚申仲夏又作放言六首有富來架屋連雲棧轉眼春糧不夏謀佛殿勉裝過歲易工錢賒落待誰酬句牙痛諸子入候命西軒圍爐分賦及除夕詩有明日又歸三峽寺句詩集十五十八按三峽指棲賢和尚時來往其間也為倫宣明撰繹騷序語錄十二按序稱南康使君倫公遭康殘破適丁外艱報上官以其才能戡亂疏於朝廷奪禮治事寇退民逃四五年招徠修備百廢待舉一旦遭讒被檄無以自白閉戶讀騷咄咄發言有類乎古之孤憤者亦無年分惟詩集十五有南康太守倫宣明使君見過及倫太守被謫待命詩次於己未歲晏詩後又有柬倫太守詩有獨憐狡兔川原盡翹首九重淚點巾句次於哭澹歸釋子詩後則為庚申作矣今釋卒年六十七和尚有詩哭之詩集六十五憺園集三二澹歸釋禪師塔銘康熙二十年辛酉一六八一七十四歲作眼昏詩有去年齒痛疑生盡今日偷生眼又昏句又作淨成上老父供阻雪十日二首有因展先容歸故隱句詩集十五十六今無卒年四十九和尚有詩哭之詩集十五光宣臺集附古雲撰行狀康熙二十一年壬戌一六八二七十五歲因病掩關作秋夕關中關中七月念九日早起中秋病起與諸子玩月及雪中上淨成諸詩有一病沉沉夏復秋句詩集十六康熙二十二年癸亥一六八三七十六歲八月施琅入臺灣鄭克塽迎降十月詔沿海遷民復歸田里清史稿聖祖紀康熙二十三年甲子一六八四七十七歲有病中及中秋移榻上雙鏡樓詩詩集十六康熙二十四年乙丑一六八五七十八歲南康郡守以世法繩諸剎和尚乃入嶺養疴行狀按海雲禪藻集一今摩傳云聞山中僧徒悉編保伍遂還雷峯所謂世法似指保伍事作乙丑初春即事詩有守拙匡徒五十年未嘗俯仰向人前句並有樟樹舟中過贛州關舟抵南安度大庾嶺還海雲病中書懷及八月初五日示諸子詩有牀頭休問菊花期之示詩集十六八月二十七日酉時終於海雲寺丈室親書偈別眾曰生也如是死也如是如是不是亦如是是不是亦如是星宿經天霜風帀地汝諸人到者裏大須仔細七十八年老道翁飜轉面來不知是我是你信手拈來猶較些子明年丙寅四月初六日塔全身於丹霞對岸佛日山麓今辯為撰行狀又明年丁卯辯以書狀請湯來賀撰塔誌銘後遷回羅浮建塔於黃牛逕下行狀塔誌銘羅浮志補按遷葬羅浮未詳年分咸陟堂詩集二登海螺巖謁澹歸禪師塔詩有石龕緊閉未岑寂隔江更有天然翁句成鷲遊丹霞在康熙三十三年甲戌三十四年乙亥間又咸陟堂文集六澤萌遇禪師傳云師辛巳掃塔於丹霞是康熙四十年尚未遷葬也先父撰重刻海雲禪藻集序云塔為弟子今但營造今塔尚存和尚法嗣今但最後歿雍正時尚健在塔為但造其遷葬在康熙末雍正前矣羅浮志補云自黃龍洞口西行過黃牛逕亦名黃龍逕三里許度雨花橋又北行五里至華首臺三十年辛未辯應粵西永寧之請奉和尚語錄首楞嚴直指楞伽心印三種入嘉興續藏中海雲禪藻集一嘉興藏目錄按永寧州屬桂林府辯有永寧呈諸護法詩今辯撰行狀云師生平古道自持壁立千仞提倡綱宗眼空今古婆心為物至老不衰於門庭設施悉任外緣意合則住不合則行未嘗一字一語仰干豪貴吾粵向來罕信宗乘自師提持向上縉紳逢掖執弟子禮問道不下數千人得度弟子多不勝紀尤喜與諸英邁暢談窮其隱曲以發其正智於生死去就多受其法施之益即一闡提與自負奇才而不可一世者見之無不心折且師闔家出世在盛平時生我同生所生以至妻媳捨世緣如棄敝屣不讓古龐公故父子兄弟相率剃染粵中為多師暮年為法求人心焉益切每談及先宗淚即沾襟期諸後起如地藏之遇清涼圓悟之得妙喜庶幾無憾故法道隆替雖繫乎時逆撑洞流志無少屈足見護念佛祖慧命亙古而不磨也天然和尚著述考楞伽心印四卷康熙刻本嘉興續藏本雍正海幢經坊本日本續藏本自述及刊刻年分詳年譜康熙二年九年條今無撰緣起云雷峯老人之疏是經也以宗門爪牙入性相窟宅慨義學之荒蕪悲禪門之儱侗蓋自癸巳退隱匡埠覩世寒心感時勵志所由來矣故其挂瓢金井倚杖玉淵問契證則心湛海澄仰嘉遯則身高岳峙地藏琛之耕田博飯棲賢湜之立誦行披寒爐冷竈惟大法之全提叢棘亂絲仗智峯而獨斷其於古人實兼之矣逮戊戌返嶺今無以明年自玉門趨歸壬癸之歲日與石鑑諸弟請益唯識謂本楞伽指冥初神我不與性珠而濫收俾龜毛沙油頓覺妄情之自遣因伸旨要遂啟疏緣妙叶心宗帶圓名相不惟砥柱狂禪兼亦激昂講席匠心迥邁匯義海於洞源神機淵默破眾難於半偈勞顏汗手會粹披尋覩大義之炳如慶微言之不墜教以翊宗原別傳之并四卷識即是藏扶大心以迭二乘此誠運最上之心蒿目時弊而為者也故凡疏內有入理深談得經文肯綮即文義而見宗乘會宗乘而融文義敢僭點出以示來學四河俱入一漚匪存是在臨文澄其慧目時康熙甲辰中秋前五日嗣法門人今無稽首敬述首楞嚴直指十卷康熙刻本嘉興續藏本日本續藏本此書撰著及刊刻年分詳年譜康熙七年十六年十七年條今釋撰敘云大覺能仁成道十日即說華嚴以眾生住地煩惱為諸佛不動智如將寶位直授凡庸故非三乘之流所能諦信當時聲聞在坐不見不聞然而最後拈華則金色頭陀獨得別傳之囑慶喜繼之為西天二祖雖登位於剎竿倒却之時而發悟在擊鐘驗常之際則楞嚴一經又宗門之法印也古今疏此俱擅所長吾師天然昰和上宴坐丹霞以三月成直指適屆示生之期甘露降於叢竹今釋受而伏讀青蓮發筆端之瑞赤珠映意地之光微眹不留是跡皆剗言言本色不借華詞其不可思議之妙實有與諸家逈絕者彼皆悟門各得然而見量未忘往往以詞害志執藥成病原其所由不過能推非心離塵有性而已夫能推是妄離塵無體此如來語也如來不云性真常中求於去來迷悟生死了無所得耶真覺無功根塵何咎極其轉名不轉體之致未能迷悟併銷而迷悟不銷則常光便隔妄即不存真復何在當下覺了已落紆回故為之直示曰非別有一真在緣慮之先影像之外也若謂分別之心與塵俱滅則無分別智不與塵俱生各成一物於何立界故為之直示曰但據其所謂全性者捨分別而更有不知其所謂分別者捨全性而必無也於此不明詎稱圓悟所以破心破目無罪加誅有正有倒將名作實體用上下析見見於現前人法後先失空空於頓覺斷而得顯因緣自然之戲論滋深修乃可成諸佛眾生之分疆愈遠倘能豎掃同時始信因果俱幻是故法性海中本絕思惟四十九年不說一字若云此謂權此謂實此謂見此謂修此謂圓融此謂行布纔成實法便非了義乃至性覺必明妄為明覺依經立解寧不較然然於性覺生取心則明能生所無如其與妄俱來於明覺生捨心則所必障明無如其并真俱棄遂使覺與所明如來語下二俱有過安知明與無明如來藏中一亦不存故又為之直示曰覺明不礙性覺之常然性覺豈傷覺明之自異悟理之士亦可立地冰消矣而每至險崖輒生前却者蓋聖境不捐故凡情競起也識其惟一乾慧則流轉四生名為亂想洊登妙覺名為極果皆是分外不契本然故又為之直示曰捨亂想必無乾慧亦猶捨乾慧必無極果遂以亂想為乾慧似有悟迷至於乾慧而回觀亂想悔不安住尚若遜其所不及者然後知迷之不可得也迷不可得悟亦何為能仁成道之後適還其眾生之初泯法界量現法界身說法界事顯法界理若作聖解即受羣邪縱將寶位直授凡庸亦恐凡庸不應重受彼聲聞在坐不見不聞正與破顏微笑同一玄賞今釋豈能更有思議於吾師不可思議之中耶謹因讀疏之餘隨見隨拈因月有指非月所取若其全經旨趣則一總論已化為無縫天衣一切眾生於一原題全現出無見頂相開卷了然無塵不破此即枝中覓本委上求原不妨引而伸之作鈍根之助爾嗣法門人今釋稽首和南敬序今辯撰緣起云老人疏是經三月而成入理深談多提持向上啟發悟門真足為上根之助遠邇緇素渴仰法味大中丞傅公竹君遂捐資全刊流通何其易也昔天台智者大師聞是經為天竺所秘重晨夕西望懇禮願早至此土歷百餘載有沙門般剌密諦始携來以國禁嚴密屢不果乃書於微細白㲲析臂藏之肉內航海而達穗城時值丞相房融出知南銓請譯於訶林風旛堂親為筆受故經中文句皆明暢而曲析傅公未識老人未讀經疏而亟欲流通使法雨得以均霑為快者豈非於楞嚴宣勝義中大有夙契之緣歟夫菩薩以利物為懷就事就理雖有淺深究其指歸原無二致公昔守慶陽今撫粵西識度超卓指麾敏捷一舉止間悉不落尋常蹊徑其與會中文殊師利摧邪輔正選擇圓通而終出於無是非是機感相類即事顯理願公與大地含靈同入圓通無礙門親證如來無見頂相即理顯事願諸閱者與公同發菩提心現觀世音三十二應身挽斯世斯民躋於羲軒之治則於老人之法施傅公之流通兩無辜負爾住丹霞今辯槃談謹述金剛正法眼今辯撰行狀謂著有楞伽楞嚴金剛三疏行世此書刻本未見道獨曾為作序見長慶語錄詳年譜順治十八年條般若心經論日本續藏本此論載入嘉興續藏本語錄卷十二以日本續藏經別出單行故著錄之天然昰禪師語錄十二卷嘉興續藏本此書乾隆間列入禁書目傳本極罕故宮藏有一部承陳援庵先生假鈔寄贈前有目錄函修梁殿華陸世楷序文三篇湯來賀撰塔誌銘今辯撰行狀卷一上堂卷二卷三小參卷四普說卷五普說茶話卷六室中垂示卷七舉古問答頌卷八問答頌古卷九讚偈銘卷十書問卷十一雜著卷十二雜著佛事附梅花詩雪詩乃和尚示寂後今辯彙各剎語錄編成函修陸世楷二序當即訶林丹霞語錄序也孫殿起清代禁書知見錄著錄康熙庚戌嘉興楞嚴寺般若堂刊本庚戌為康熙九年語錄收有康熙十九年之作不合庚戌疑甲戌之誤天然和尚梅花詩有單行本再傳弟子古鍵寫刻版藏廣州海幢寺函修撰序云諸佛為一大事因緣出現於世匪直自了有大悲大願焉悲大故其憂之也深願大故其任之也重昔風穴垂涕告首山曰不幸臨濟之道至吾而將墜矣誠憂之也其後再傳而有汾陽既放身命閉關堅臥郡守以名剎力致八請不答僧契聰者排闥讓之曰佛法大事靖退小節風穴常憂遇風則止幸而有先師今汝有力擔荷如來此何時而欲高眠耶汾陽瞿然起曰非公不聞此言趣辦嚴吾行矣誠任之也函修因是而深嘆古今人之不相及也道人撒手臥長空菩提真如猶為垢膩况復世間名聞利養豈似今時把箇死蛇頭逢人便賣疴漉漉地但知與兒乳酥不問消與不消此不過欲得門庭熱鬧耳善知識以本分接人其謂之何我大師以大悲願力復來閻浮橫挑楖𣗖直入千峯豈肯打入時流隊伍去春携修出匡廬歷江南北拄杖邊不曾撩著半箇幾欲焚茅屋入深山偶以省覲歸僊城一時道俗迎主訶林乃翻然抱深憂而肩重任師冷硬之性壁立萬仞莫可仰扳百千妙義到他跟前一棒粉碎其所開示大要貴人不著法報化立處皆真如擊塗毒鼓聞者皆死大矣哉無為寂滅之幢也古人於此三二十年猶不奈何而我師纔搭緇衣便登祖位人將謂此道直易易耳亦知師之真參實證乎師嘗究理而坐十七晝夜不合眼以為必識盡功忘自然合他古轍始得任心自在後參黃巖因閱華嚴所得都亡其絕情過量之智已於無量佛所培養豈特三二十年而已今法語具在使天下後世知此百犬吠聲羣盲相引時猶有人提唱斯事佛祖慧命庶幾不斷而後乃相安於無言此師之志也函修初曾認著露裸裸底幾恁禍事幸取决於師得箇轉身雖修與師皆從今華首和尚剃度於法門為弟昆然實受師資之益知師者宜莫若修故敢揭其大端如此崇禎壬午冬日同門弟子函修和南譔梁殿華撰序云天然和尚以居士身夙慧頓發了悟上乘後從空隱老和尚剃度於廬山證明大法杖錫所經悲愍之懷溢於言際職書記者輯而成編付諸剞劂屬今轉恭為之序夫轉固無能序而亦無可序也憶丁亥秋轉與龐子若雲迎和尚結期弼唐將謂有言可循也有法可得也及參隨數月始知日星雲漢山嶽江河以至竹影松聲蟲鳴鳥語盡為和尚筆舌舍此而欲向一言一句之下承當箇事何異撥波求水然則是錄也又胡為乎來哉夫大聖人出現於世其中皆大有不獲已者眾生日見道而不見日聞道而不聞是不有見孰為不見是不有聞孰為不聞而要所見何見所聞何聞應必悄然自得亦復啞然自失靈山會上拈花微笑我佛世尊打頭一步蚤已逗漏不少然畢竟何如心行何如旨趣必使千百世而下猶有跛脚翁堪解報恩此世尊之為甘心即我和尚之為甘心也願天下後世得意忘言見聞都盡自度度他共臻無上云爾尚區區語句中求其罪過且與謗法等是則今轉所大懼也夫是則閱斯錄者所大懼也夫順治戊子孟春門弟子今轉梁殿華稽首恭序陸世楷撰序云昔者宣聖振鐸於東方釋尊授衣於西土一則意盡象中一則心傳教外其皇皇焉牖世覺民之心固異致而同歸也自儒術既衰微言遂絕縉紳縫掖之輩高者攻於經學卑者溺於文詞而聖賢盡性知命之旨無復為之殫心矣釋尊諸祖乃以單提直指之說示彼正覺救此迷情於是聰明奇特之士厭迂儒之拘牽樂禪宗之超脫一言契旨片偈投機而所謂儒門澹泊收拾不住者張無盡以為達人之論深有以哉始壇經剏著文字踵增臨濟開玄要之宗洞山立君臣之義溈仰發體用之論雲門捷示三關法眼分呈六相究其捨妄歸真不離自性夫是以從事誠明之學者如濂溪嘗師鶴林姚江借塗蔥嶺不啻冥心而求之也本師天然和尚夙領儒宗久膺祖席身乘五衍心入三摩譬如洪鐘萬石有叩輙鳴遙源千頃無挹不注向在雷峯棲賢華首訶林諸山皆有語錄行世學人奉為津筏寶若琬琰矣廼者山靈初啟叢席旋興西堂澹公因南陽之舊基開東林之新剎祗園翬建緇侶雲臻爰從丙午冬仲奉本師以居焉師則性樂巖阿心悲塵剎既得棲真之境益弘樂育之懷或策杖而陵峯或披襟而笑月蒼松白雪歲見新篇紫玉青螺時聞佳什蓋已目擊道存無行不與矣然而钁頭斧子不廢鉗錘擊碓敲床更勤提命山中高弟以師法語彙錄成編命小子楷敘而梓之余惟儒門淆雜特闢禪關若悟本來同歸覺路而師先得淵源於孔孟繼聞秘密於迦文固知六通八正不同幻妄之談牕影風幡無取尖新之解也余嘗再訪檀林一瞻猊座見其登堂之彥濟濟趨蹌入室之英雍雍問辯雖杏壇講習遜此威嚴沂水詠歌同斯怡悅矣是錄也推原心性利濟人天有以佐吾儒道德齊禮之所不及公之諸方垂之奕葉將使慧日同光名山竝壽海螺巖下永振威音錦石溪邊長流法乳豈徒拾拄杖之陳言資曲床之談柄已耶若夫佛法深微不從解入自非立雪數年未易領會又何敢於威儀談說之間管窺而蠡測也康熙庚戌上元當湖弟子陸世楷今亘和南謹撰各剎語錄瞎堂詩集十七有刻訶林語錄成謝諸檀越二絕句行狀謂著有各剎語錄行世陸世楷撰語錄序謂向在雷峯棲賢華首訶林諸山皆有語錄行世各錄刻本未見今嘉興續藏本有住訶林雷峯棲賢華首海幢芥庵丹霞歸宗諸山語錄當即此惟編次依體分類遂難析別光孝寺志載和尚語錄皆訶林部分注云選原集間有嘉興續藏本所未載者知寺志所據當為訶林語錄原本而今辯彙編語錄時略有刪節或有未見歟禪醉行狀謂著有禪醉行世刻本未見語錄十一有禪醉十篇前有小序一致知二近非道三天不可合四天不可非五鴨脚木六性習七百姓日用而不知八椎魯九聰辯十非習非心乃應崔石師巖子潛子破子卷諸人問而作其近非道篇有戊子夏阻饑海雲語疑為是年間所撰詳年譜順治五年條瞎堂詩集十七有示崔石師及悼崔石師詩石師名采見喻園集較刻同社姓氏語錄九有示巖侍者偈海雲禪藻集有古卷字破塵潛子待攷焚筆行狀謂著有焚筆行世刻本未見道光廣東通志藝文略集部作禪醉焚筆下注存字然禪醉已刊入語錄故另列之天然和尚同住訓略順治雷峯監寺今應刻本此書前半敘寺中及職事之規則後半則訓誡之文凡責擯五款不同住四十一款鐘版堂三十款首座四款侍者書記十四款兩序各堂寮三十四款老病堂十二款常住存發定式九款聖節朔望日用參見禮儀掛搭各三款補堂寮補侍寮退侍寮退堂寮退隨眾寮補職日限息緣慮告假各一款抽罰二款設思過從新兩寮責誡童行揀俗稱知事須知戒立徒行門輕重相準是非功勳平氣止勞誇毋急說慎憎愛恤老病謹言損傲禁奢伐同異忘非省過之難舉過不易功行不可以語道任情非隨緣各一款巡照警夜歌三首中夜迴向文一首禪門念佛說一首塔誌銘稱和尚所立規矩整肅森嚴即指此書也參年譜順治九年條東莞縣志八卷未見崇禎十二年縣令汪運光修張二果輯宣統東莞縣志載運光序云是志也孝廉張君實為月旦所推許力砥空平以總其裁復聘曾君宅師訂證之詳年譜崇禎十三年條似詩行狀謂著有似詩行世刻本未見自序見瞎堂詩集卷首詳年譜康熙七年條今無光宣臺集五有丹霞天老和尚古詩序錄後戊申八月天老人手書命今無曰近日禪講暇偶為古詩諸子請付梓欲少待之不可汝其序之此老人之逸言微借工部之氣出之者也今無憶曩時處大窖中嘗與剩師叔擁被寒吟以藝海書厨消黃沙白雪間取杜少陵集讀之擊案叫呼觀其夔門以後諸作悲憂愉迭感國傷懷饑寒酸楚如老婦子坐中堂數家中事歷歷可見真樸有味令人意往神消剩師叔謂無曰夫物久則舊詞確則新雖世深代遠人其云亡而其使人愁鬱無聊之境何代無之今身居絕域邊聲刺人短草如烟王孫有恨長垣似水木佛無家以彼全集作我橫涕何其聲之感人若是也故詩取窮愁人當問世此作古者執之如券若夫鬥春色於麗辭奪秋光於寒魄匠意既深鍊飾良苦羽翼雖備而筋骨未全不堪闖入作者壇坫摹詞雖工生意易盡所謂有詩無人終未若一回坐到耳夫道人晶瑩圓湛中恬靡激既無噩夢又薄雕蟲而一種磊砢沉鬱駸駸勁挺起正雅而溺靡嫚掩初盛而聯漢魏此其聲又何自而然哉夫情之最重者也扇激奔躍尾然相逐使一頓錯乖漓宣之以聲而成之以文則其婉遒宕折環廻娓叠發人幽思如病骨秋容涉轟雷三峽殆有不堪自持者故大雅之音尚其恬澹所以為情之防而有幾夫道道固勝情此道人之所以自成其聲以閒裕為牢落以峭潔為壹鬱內華外融不涉境之以動情不先詞而後我憑高縱目據梧發聲極雲樹之依微盡禽蟲之鳴變當見其優游夷愉高明廣厚人雖目之曰境毋乃非境雖目之曰情毋乃非情後情境而共材華呈神鑑而齊聲調使荊卿易水屈原湘江頓變為智河慧海雖有虞氏之南風未足比數而老人微言道韻木葉藏春軒軒自遠又可以尋常作者目之哉抑今叢席學者無師人例闒茸庭多茂草雖日為之愾然斬除而世驅風變又竝塵伍俗勵魄惕魂雖不能無中激外動可謂入水侏儒棄爐鈍鐵方視缺如惄其未逮而老人茲什之作止水照人澄渟含蓄則又豈後於金函貝葉哉瞎堂詩集二十卷道光海幢寺經坊重刻本此集為和尚示寂後今毬取似詩與其未刻稿彙編而成乾隆間列入禁書目原刻本未見道光本卷首有象張維屏撰象贊似詩自序附今毬跋湯來賀撰塔志銘目錄卷一古歌謠風雅體騷體卷二樂府卷三至卷五五言古一至三卷六五言古四及七言古卷七至卷九五言律一至三卷十至十六七言律一至七卷十七五言絕及七言絕一卷十八七言絕二卷十九梅花詩卷二十雪詩詳年譜康熙七年條今毬撰跋曰此老人早歲刻似詩自序也老人生平吟咏之意已盡於是讀者玩索之不唯老人之詩可悟即老人之人亦可得故全集編定即錄以為序今毬謹識丹霞詩此為和尚住丹霞時與相隨諸子唱和之什未見傳本詳年譜康熙八年條今無撰丹霞詩序曰雷峰老人深於入山之致相隨諸子亦皆骨具烟霞鼉鳴鱉應故其一唱百和如天籟所觸別具幽響非如詞人韻客構雅什於文心逸清言於雲路作區區綺麗觀也澹歸以金剛心鑄成霞山一席使法王有居有處龍象可步可隨幽谷迎人長林適意宜其情見於言筆其言則似乎詩霜禽秋浦跡在有無是則又在讀是詩者能別具隻眼耳古人謂雪夜洪爐爐邊當有三種人一趺坐安禪一圍爐說食一吮墨吟雪詩其旨皆短之而宗門大人境界不言而頓顯矣夫以肥遯之情而同觸境之樂具超方之手而為役志之言則遠公白雲瑤草長日堆堆誰家赤尾泝流抵源當自不費鹽醬耳光宣臺集六遺作和尚遺作有與空隱和尚書長慶老和尚行狀見長慶語錄楞伽心印自述見原書似詩自序見瞎堂詩集書卷子與陳喬生寄陳喬生見中洲草堂遺集卷末建造雷峰寺書見廣東文物景印本下半不全忠愍公黎美周先生象贊見蓮鬚閣集卷首雷峰海雲寺放生社置田碑後記見番禺縣續志三六病中示偈見今辯撰行狀今無象贊見光宣臺集卷首付今無大法偈付今覞大法偈付今摩大法偈付今釋大法偈付今攝大法偈見海雲禪藻集及年譜康熙三年條喜阿侍者呈偈用韻示此見年譜順治十六年條均天然語錄瞎堂詩集所未載
